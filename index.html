<style>
  :root {
    --primary: #185FA5;

    --primary-mid: #378ADD;
    --success: #3B6D11;
    --success-light: #EAF3DE;
    --warning: #854F0B;
    --warning-light: #FAEEDA;
    --danger: #A32D2D;
    --danger-light: #FCEBEB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --gray-100: #F1EFE8;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --text-primary: #1a1a1a;
    --text-secondary: #5F5E5A;
    --bg: #f7f6f3;
    --bg-card: #ffffff;
    --border: #e0ded8;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  #app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 230px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    height: 100vh;
    z-index: 100;
  }

  .sidebar-brand {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-brand h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    line-height: 1.3;
  }

  .sidebar-brand p {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .sidebar-user {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FIX 3: Avatar bulat - object-fit cover + object-position center */
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    overflow: hidden;
    background-clip: padding-box;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border-radius: 50%;
  }

  .avatar-lg {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 600;
    overflow: hidden;
    margin: 0 auto 12px;
    border: 3px solid var(--border);
  }

  .avatar-lg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border-radius: 50%;
  }

  .sidebar-user-info .name { font-size: 12px; font-weight: 600; }
  .sidebar-user-info .role { font-size: 11px; color: var(--text-secondary); }

  .sidebar-nav {
    flex: 1;
    padding: 8px 8px;
    overflow-y: auto;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
    margin-bottom: 1px;
  }

  .nav-item:hover { background: var(--gray-100); color: var(--text-primary); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-logout {
    width: 100%;
    padding: 7px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }

  .btn-logout:hover { background: var(--danger-light); color: var(--danger); border-color: #f0c0c0; }

  .main {
    margin-left: 230px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar h2 { font-size: 16px; font-weight: 600; }

  .content { padding: 24px; flex: 1; }

  #screen-auth {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 24px;
  }

  .auth-logo .logo-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
  }

  .auth-logo h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
  .auth-logo p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text-primary);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--primary-mid);
    box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.12);
  }

  .btn {
    padding: 9px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    text-decoration: none;
    color: var(--text-primary);
    background: var(--bg-card);
  }

  .btn:hover { background: var(--gray-100); }
  .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
  .btn-primary:hover { background: #0d4a8a; border-color: #0d4a8a; color: white; }
  .btn-block { width: 100%; justify-content: center; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn-success { background: var(--success); color: white; border-color: var(--success); }
  .btn-success:hover { background: #2a5209; color: white; }

  .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .auth-tab {
    flex: 1; padding: 8px; text-align: center; font-size: 13px;
    font-weight: 500; cursor: pointer; background: transparent;
    border: none; color: var(--text-secondary); transition: all 0.15s;
  }
  .auth-tab.active { background: var(--primary); color: white; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-card .value { font-size: 22px; font-weight: 600; color: var(--text-primary); }
  .stat-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--gray-100);
    padding: 9px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  tbody tr:last-child { border-bottom: none; }

  .badge {

    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-blue { background: var(--primary-light); color: var(--primary); }
  .badge-green { background: var(--success-light); color: var(--success); }
  .badge-amber { background: var(--warning-light); color: var(--warning); }
  .badge-red { background: var(--danger-light); color: var(--danger); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  .badge-teal { background: var(--teal-light); color: var(--teal); }
  .badge-gray { background: var(--gray-100); color: var(--gray-600); }

  .mark-input {
    width: 70px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
    background: var(--bg-card);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .mark-input:focus { border-color: var(--primary-mid); box-shadow: 0 0 0 2px rgba(55,138,221,0.12); }

  .progress-bar {
    height: 6px;
    background: var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.3s;
  }

  .alert {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .alert-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #f0c0c0; }
  .alert-success { background: var(--success-light); color: var(--success); border: 1px solid #c0de97; }
  .alert-info { background: var(--primary-light); color: var(--primary); border: 1px solid #b5d4f4; }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-secondary);
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--gray-100); }

  .star-group { display: flex; gap: 4px; }
  .star {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .star.selected { background: var(--warning-light); color: var(--warning); border-color: #FAC775; }
  .star:hover { background: var(--warning-light); color: var(--warning); }

  .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab {
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .hidden { display: none !important; }
  .text-muted { color: var(--text-secondary); }
  .text-sm { font-size: 12px; }
  .fw-500 { font-weight: 500; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .text-center { text-align: center; }
  .p-0 { padding: 0; }

  /* FIX 3: Photo upload dengan crop position */
  .photo-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 14px;
  }
  .photo-upload-area:hover { border-color: var(--primary-mid); background: var(--primary-light); }

  /* FIX 3: preview gambar dalam upload area */
  .preview-circle-wrap {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 8px;
    border: 3px solid var(--border);
    background: var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: center;

    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .gred-A { color: var(--success); font-weight: 600; }
  .gred-B { color: var(--primary); font-weight: 600; }
  .gred-C { color: var(--warning); font-weight: 600; }
  .gred-D { color: #884400; font-weight: 600; }
  .gred-F { color: var(--danger); font-weight: 600; }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .info-row {
    display: flex;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { width: 160px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .info-value { flex: 1; color: var(--text-primary); }

  .mark-summary-row {
    display: flex; align-items: center; gap: 10px;

  }
  .mark-summary-row:last-child { border-bottom: none; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }
  .empty-state p { font-size: 13px; }

  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--text-primary);
    color: white;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 9999;
    animation: slideUp 0.3s ease;
    max-width: 320px;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* FIX 1: Upload progress */
  .upload-progress {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--primary);
    margin-top: 6px;
  }
  .upload-spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ================================================================
// GOOGLE APPS SCRIPT API — GitHub Pages → GAS via fetch()
// GAS mesti deploy sebagai "Anyone" dengan CORS support
// ================================================================
const GAS_URL = 'https://script.google.com/a/macros/ipgm.edu.my/s/AKfycbwnMyQiezYOhHI28KD-ozAoj9a5DuHiCN2zTrt3Nj-PqsXPV_rXhYKYmFXdjbG3UzH1yg/exec';

// ================================================================
// HELPER: Panggil GAS via fetch (JSONP untuk elak CORS block)
// GAS tidak support CORS dari luar domain — guna URL param + callback
// ================================================================
async function callGAS(action, payload = {}) {
  try {
    // PENTING: guna POST (FormData) bukan GET — kerana URL berformat
    // /a/macros/[domain]/s/.../exec akan STRIP query string (?action=...)
    // semasa redirect ke googleusercontent.com bagi domain Workspace.
    // Body POST tidak terjejas oleh masalah ini.
    const body = new FormData();
    body.append('action', action);
    body.append('payload', JSON.stringify(payload));

    const resp = await fetch(GAS_URL, {
      method: 'POST',
      body,
      redirect: 'follow'
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    try {
      return JSON.parse(text);
    } catch {
      const match = text.match(/\{[\s\S]*\}/);
      if (match) return JSON.parse(match[0]);
      throw new Error('Response bukan JSON');
    }
  } catch (e) {
    console.warn('GAS fetch gagal:', e.message);
    return null;
  }
}

// POST untuk data yang besar (markah batch, biodata, gambar)
async function callGASPost(action, payload = {}) {
  const body = new FormData();
  body.append('action', action);
  body.append('payload', JSON.stringify(payload));

  // KAEDAH "no-cors": penyelesaian paling stabil untuk akaun domain
  // Workspace (@ipgm.edu.my). Browser tetap MENGHANTAR request POST
  // dan GAS tetap MENJALANKAN fungsi (data ditulis ke Sheet/Drive),
  // tetapi kita tidak boleh membaca respons (sebab tiada header CORS
  // dari Google). Jadi anggap berjaya jika tiada ralat rangkaian.
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body,
      mode: 'no-cors',
      redirect: 'follow'
    });
    // Respons 'opaque' — tidak boleh dibaca, tapi request berjaya dihantar
    return { ok: true, opaque: true };
  } catch (e) {
    console.warn('GAS POST (no-cors) gagal:', e.message);

    // Fallback: cuba mode normal (untuk persekitaran yang support CORS)
    try {
      const resp = await fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' });
      const text = await resp.text();
      try { return JSON.parse(text); }
      catch {
        const match = text.match(/\{[\s\S]*\}/);
        if (match) return JSON.parse(match[0]);
        return { ok: true, opaque: true };
      }
    } catch (e2) {
      console.warn('GAS POST fallback gagal:', e2.message);
      return { ok: false, error: e2.message };
    }
  }
}

async function saveMarkahData() {

  try { sessionStorage.setItem('ipg_markah', JSON.stringify(markahDB)); } catch(e) {}

  const rows = Object.entries(markahDB).map(([nokp, m]) => {

    if (!p) return null;
    return {
      nokp, nama: p.nama, kelas: p.kelas, agiliran: p.agiliran,
      kuiz: m.kuiz ?? null, hp4: m.hp4 ?? null, hp5: m.hp5 ?? null,
      hp3: m.hp3 ?? null, hp8: m.hp8 ?? null,
      dikemaskiniOleh: currentUser?.nama || ''
    };
  }).filter(Boolean);

  if (rows.length > 0) {
    await callGASPost('saveBatchMarkah', { rows });
  }
}

async function loadDataFromSheets() {
  try {
    // Muat satu persatu untuk elak timeout
    const markahRes = await callGAS('getAllMarkah');
    if (markahRes?.ok && markahRes.data) {
      markahDB = {};
      markahRes.data.forEach(m => {
        if (!m.nokp) return;
        markahDB[m.nokp] = {
          kuiz: m.kuiz != null ? parseFloat(m.kuiz) : undefined,
          hp4:  m.hp4  != null ? parseFloat(m.hp4)  : undefined,
          hp5:  m.hp5  != null ? parseFloat(m.hp5)  : undefined,
          hp3:  m.hp3  != null ? parseFloat(m.hp3)  : undefined,
          hp8:  m.hp8  != null ? parseFloat(m.hp8)  : undefined,
        };
        // Buang kunci undefined
        Object.keys(markahDB[m.nokp]).forEach(k => {
          if (markahDB[m.nokp][k] === undefined) delete markahDB[m.nokp][k];
        });
      });
      try { sessionStorage.setItem('ipg_markah', JSON.stringify(markahDB)); } catch(e) {}
    }

    const biodataRes = await callGAS('getAllBiodata');
    if (biodataRes?.ok && biodataRes.data) {
      biodataDB = {};
      biodataRes.data.forEach(b => {
        if (!b.nokp) return;
        biodataDB[b.nokp] = {
          jawatan: b.jawatan || '', kumpulan: b.kumpulan || '',
          noDlmKumpulan: b.noDlmKumpulan || '', alahan: b.alahan || '',
          ubat: b.ubat || '', notel: b.noTelKecemasan || '',
          gambar: b.urlGambar || ''
        };
      });
      try { sessionStorage.setItem('ipg_biodata', JSON.stringify(biodataDB)); } catch(e) {}
    }

    const peerRes = await callGAS('getPeerRatings', {});
    if (peerRes?.ok && peerRes.data) {
      peerRatingsDB = peerRes.data;
      try { sessionStorage.setItem('ipg_peer', JSON.stringify(peerRatingsDB)); } catch(e) {}
    }
  } catch (e) {
    console.warn('Load dari Sheets gagal, guna cache:', e);
    loadFromSession();
  }
}

function loadFromSession() {
  try {
    const m = sessionStorage.getItem('ipg_markah');
    if (m) markahDB = JSON.parse(m);
    const b = sessionStorage.getItem('ipg_biodata');
    if (b) biodataDB = JSON.parse(b);
    const p = sessionStorage.getItem('ipg_peer');
    if (p) peerRatingsDB = JSON.parse(p);
  } catch(e) {}
}

// ================================================================
// UPLOAD GAMBAR KE GOOGLE DRIVE via GAS POST
// Gambar dihantar sebagai base64 string
// ================================================================
async function uploadGambarKeDrive(file, nokp) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async function(e) {
      const base64Data = e.target.result; // full data URL: data:image/jpeg;base64,...
      const base64 = base64Data.split(',')[1];
      const mimeType = file.type || 'image/jpeg';
      const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
      const fileName = 'gambar_' + nokp + '_' + Date.now() + '.' + ext;

      try {
        const result = await callGASPost('uploadGambar', {
          base64, mimeType, fileName,
          folderId: DRIVE_FOLDER_ID,
          nokp
        });

        if (result?.ok && result.url) {
          // GAS return direct view URL dari Drive
          resolve(result.url);
        } else {
          // Fallback: simpan base64 terus (kekal dalam session)
          console.warn('Upload ke Drive gagal, guna base64:', result?.error);
          resolve(base64Data);
        }
      } catch (err) {
        console.warn('Upload exception:', err);
        resolve(base64Data); // fallback base64
      }
    };
    reader.onerror = () => reject(new Error('Gagal membaca fail gambar'));
    reader.readAsDataURL(file);
  });
}

// ================================================================
// GRADE CALCULATION
// ================================================================
// Had maksimum setiap komponen (markah dimasukkan terus, tiada wajaran)
// Kuiz max 10 | HP4 max 30 | HP5 max 30 | HP3 max 15 | HP8 max 15 | Jumlah max 100
const MARK_MAX = { kuiz: 10, hp4: 30, hp5: 30, hp3: 15, hp8: 15 };

function calcMarkah(nokp) {
  const m = markahDB[nokp] || {};
  const kuiz = Math.min(parseFloat(m.kuiz) || 0, MARK_MAX.kuiz);
  const hp4  = Math.min(parseFloat(m.hp4)  || 0, MARK_MAX.hp4);
  const hp5  = Math.min(parseFloat(m.hp5)  || 0, MARK_MAX.hp5);
  const hp3  = Math.min(parseFloat(m.hp3)  || 0, MARK_MAX.hp3);
  const hp8  = Math.min(parseFloat(m.hp8)  || 0, MARK_MAX.hp8);
  const hpk1 = parseFloat(kuiz.toFixed(2));
  const hpk2 = parseFloat((hp4 + hp5).toFixed(2));
  const hpk3 = parseFloat((hp3 + hp8).toFixed(2));
  const jumlah = parseFloat((hpk1 + hpk2 + hpk3).toFixed(2));
  return { hpk1, hpk2, hpk3, jumlah, kuiz, hp4, hp5, hp3, hp8 };
}

function getGred(j) {
  if (j >= 90) return { gred: 'A+', mata: 4.0 };
  if (j >= 80) return { gred: 'A', mata: 4.0 };
  if (j >= 75) return { gred: 'A-', mata: 3.7 };
  if (j >= 70) return { gred: 'B+', mata: 3.3 };
  if (j >= 65) return { gred: 'B', mata: 3.0 };
  if (j >= 60) return { gred: 'B-', mata: 2.7 };
  if (j >= 55) return { gred: 'C+', mata: 2.3 };
  if (j >= 50) return { gred: 'C', mata: 2.0 };
  if (j >= 45) return { gred: 'C-', mata: 1.7 };
  if (j >= 40) return { gred: 'D', mata: 1.3 };
  return { gred: 'F', mata: 0 };
}

function gredClass(g) {
  if (!g || g === '—') return 'text-muted';
  if (g.startsWith('A')) return 'gred-A';
  if (g.startsWith('B')) return 'gred-B';
  if (g.startsWith('C')) return 'gred-C';
  if (g.startsWith('D')) return 'gred-D';
  return 'gred-F';
}

function getInitials(nama) {
  return nama.split(' ').filter(w => /^[A-Z]/.test(w)).slice(0, 2).map(w => w[0]).join('') || nama.slice(0, 2);
}

function avatarBg(nama) {
  const colors = ['#E6F1FB','#E1F5EE','#EEEDFE','#FAEEDA','#FAECE7','#EAF3DE'];
  const textColors = ['#185FA5','#0F6E56','#534AB7','#854F0B','#993C1D','#3B6D11'];
  const idx = nama.charCodeAt(0) % colors.length;
  return { bg: colors[idx], text: textColors[idx] };
}

// FIX 3: Render avatar dengan gambar yang betul crop
function renderAvatar(size, nama, gambarUrl, extraStyle = '') {
  const ini = getInitials(nama);
  const { bg, text } = avatarBg(nama);
  const imgHtml = gambarUrl
    ? `<img src="${gambarUrl}" alt="${nama}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;border-radius:50%;" onerror="this.parentElement.innerHTML='<span>${ini}</span>'"/>`
    : `<span>${ini}</span>`;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};color:${text};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.35)}px;font-weight:600;overflow:hidden;flex-shrink:0;${extraStyle}">${imgHtml}</div>`;
}

  document.getElementById('auth-error').classList.add('hidden');
  const isP = !document.getElementById('auth-pensyarah-form').classList.contains('hidden');

  if (isP) {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-password').value.trim();
    const user = PENSYARAH_DATA.find(u => u.email === email && String(u.password) === String(pass));
    if (!user) { showAuthError('E-mel atau kata laluan tidak sah.'); return; }
    currentUser = user;
    currentRole = 'pensyarah';
    await loadDataFromSheets();
    await loadAllMeritDemerit();
    startPensyarahApp();
  } else {
    const nokp = document.getElementById('auth-nokp').value.trim();
    const pelajar = PELAJAR_LIST.find(p => p.nokp === nokp);
    if (!pelajar) { showAuthError('Nombor kad pengenalan tidak dijumpai.'); return; }
    currentUser = pelajar;
    currentRole = 'pelajar';
    currentPelajar = pelajar;
    await loadDataFromSheets();
    await loadAllMeritDemerit();
    startPelajarApp();
  }
}

function doLogout() {
  currentUser = null;
  currentRole = null;
  currentPelajar = null;
  pendingPhotoBase64 = null;
  pendingPhotoFile = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('screen-auth').classList.remove('hidden');
  document.getElementById('auth-error').classList.add('hidden');
}

// Clamp input mengikut had komponen masing-masing
function clampInput(inp) {
  const mx = parseFloat(inp.dataset.max) || 100;
  let v = parseFloat(inp.value);
  if (isNaN(v)) return;
  if (v < 0) { inp.value = 0; v = 0; }
  if (v > mx) { inp.value = mx; v = mx; inp.style.borderColor = 'var(--danger)'; }
  else { inp.style.borderColor = ''; }
}

function updateMarkahLive(nokp) {
  const inputs = document.querySelectorAll(`.mark-input[data-nokp="${nokp}"]`);
  const m = {};
  inputs.forEach(inp => {
    const v = parseFloat(inp.value);
    const mx = parseFloat(inp.dataset.max) || 100;
    if (!isNaN(v)) m[inp.dataset.key] = Math.min(mx, Math.max(0, v));
  });
  markahDB[nokp] = m;
  const calc = calcMarkah(nokp);
  const { gred } = getGred(calc.jumlah);
  const totalEl = document.getElementById('total-' + nokp);
  const gredEl = document.getElementById('gred-' + nokp);
  if (totalEl) totalEl.textContent = calc.jumlah.toFixed(2);
  if (gredEl) { gredEl.textContent = gred; gredEl.className = gredClass(gred); }
}

async function saveAllMarkah() {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Menyimpan...'; }

  const inputs = document.querySelectorAll('.mark-input');
  inputs.forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) {
      if (!markahDB[inp.dataset.nokp]) markahDB[inp.dataset.nokp] = {};
      const mx = parseFloat(inp.dataset.max) || 100;
      markahDB[inp.dataset.nokp][inp.dataset.key] = Math.min(mx, Math.max(0, v));
    }
  });

  try {
    await saveMarkahData();
    notify('Markah berjaya disimpan ke Sheets!', 'success');
  } catch(e) {
    notify('Markah disimpan tempatan (semak sambungan)', 'info');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Simpan Semua'; }
  }
}

// MERIT / DEMERIT — KONFIGURASI & STATE
// ================================================================
const KATEGORI_MERIT = {
  'Hadir Awal':  2,
  'Aktif':       3,
  'Membantu':    3,
  'Kepimpinan':  5
};
const KATEGORI_DEMERIT = {
  'Lewat':                 2,
  'Tidak Hadir':           5,
  'Tidak Siapkan Tugasan': 3,
  'Salah Laku':            5
};

// Cache: { nokp: { jumlahMerit, jumlahDemerit, jumlahBersih, records: [...] } }
let meritDB = {};

// Muat semua rekod merit/demerit dan kumpul ikut nokp
async function loadAllMeritDemerit() {
  const res = await callGAS('getAllMeritDemerit');
  meritDB = {};
  if (res?.ok && res.data) {
    res.data.forEach(r => {
      if (!meritDB[r.nokp]) meritDB[r.nokp] = { jumlahMerit: 0, jumlahDemerit: 0, jumlahBersih: 0, records: [] };
      const bucket = meritDB[r.nokp];
      if (r.jenis === 'Merit') bucket.jumlahMerit += r.mata;
      else bucket.jumlahDemerit += r.mata;
      bucket.records.push(r);
    });
    Object.values(meritDB).forEach(b => {
      b.jumlahBersih = parseFloat((b.jumlahMerit - b.jumlahDemerit).toFixed(1));
      b.records.sort((a,b2) => b2.id.localeCompare(a.id));
    });
    try { sessionStorage.setItem('ipg_merit', JSON.stringify(meritDB)); } catch(e) {}
  } else {
    try { const c = sessionStorage.getItem('ipg_merit'); if (c) meritDB = JSON.parse(c); } catch(e) {}
  }
}

function getMeritInfo(nokp) {
  return meritDB[nokp] || { jumlahMerit: 0, jumlahDemerit: 0, jumlahBersih: 0, records: [] };
}

async function submitMeritDemerit(nokp) {
  const p = PELAJAR_LIST.find(x => x.nokp === nokp);
  const jenis = document.getElementById('merit-jenis').value;
  const kategori = document.getElementById('merit-kategori').value;
  const nota = document.getElementById('merit-nota').value.trim();

  const btn = event.target.closest('button');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  // Hantar ke GAS (no-cors — write tetap berjaya walau respons tak dibaca)
  await callGASPost('saveMeritDemerit', {
    nokp, nama: p.nama, kelas: p.kelas, agiliran: p.agiliran,
    jenis, kategori, nota,
    dicatatOleh: currentUser?.nama || ''
  });

  // OPTIMISTIC UPDATE: kemaskini meritDB tempatan serta-merta
  // (kerana respons GAS sebenar tidak dapat dibaca akibat CORS)
  const mata = jenis === 'Merit' ? (KATEGORI_MERIT[kategori] ?? 1) : (KATEGORI_DEMERIT[kategori] ?? 1);
  if (!meritDB[nokp]) meritDB[nokp] = { jumlahMerit: 0, jumlahDemerit: 0, jumlahBersih: 0, records: [] };
  const bucket = meritDB[nokp];
  if (jenis === 'Merit') bucket.jumlahMerit += mata;
  else bucket.jumlahDemerit += mata;
  bucket.jumlahBersih = parseFloat((bucket.jumlahMerit - bucket.jumlahDemerit).toFixed(1));
  bucket.records.unshift({
    id: 'local-' + Date.now(), tarikh: Utilities_formatNow(),
    nokp, nama: p.nama, kelas: p.kelas, agiliran: p.agiliran,
    jenis, kategori, mata, nota, dicatatOleh: currentUser?.nama || ''
  });
  try { sessionStorage.setItem('ipg_merit', JSON.stringify(meritDB)); } catch(e) {}

  notify((jenis === 'Merit' ? 'Merit' : 'Demerit') + ' (' + (jenis==='Merit'?'+':'-') + mata + ') dicatat!', 'success');
  openMeritModal(nokp); // refresh modal dengan data terkini
}

// Format tarikh ringkas untuk rekod tempatan (dd/mm/yyyy hh:mm)
function Utilities_formatNow() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function hapusMeritDemerit(id, nokp) {
  if (!confirm('Padam rekod ini?')) return;

  // Hantar ke GAS (no-cors)
  if (!id.startsWith('local-')) {
    await callGASPost('deleteMeritDemerit', { id });
  }

  // OPTIMISTIC: buang dari meritDB tempatan serta-merta
  const bucket = meritDB[nokp];
  if (bucket) {
    const idx = bucket.records.findIndex(r => r.id === id);
    if (idx > -1) {
      const removed = bucket.records.splice(idx, 1)[0];
      if (removed.jenis === 'Merit') bucket.jumlahMerit -= removed.mata;
      else bucket.jumlahDemerit -= removed.mata;
      bucket.jumlahBersih = parseFloat((bucket.jumlahMerit - bucket.jumlahDemerit).toFixed(1));
      try { sessionStorage.setItem('ipg_merit', JSON.stringify(meritDB)); } catch(e) {}
    }
  }

  notify('Rekod dipadam.', 'success');
  openMeritModal(nokp);
}

// FIX 3: Preview gambar dengan crop betul + FIX 1: simpan ke Drive
async function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) {
    notify('Fail terlalu besar. Sila pilih gambar kurang dari 3MB.', 'error');
    return;
  }

  // Tunjuk preview segera (base64) sambil upload
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingPhotoBase64 = e.target.result;
    pendingPhotoFile = file;

    // Update preview dengan crop betul
    document.getElementById('upload-preview-circle').innerHTML =
      `<img src="${pendingPhotoBase64}" alt="Preview" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"/>`;
    document.getElementById('upload-status-text').textContent = 'Gambar dipilih — tekan Simpan untuk muat naik';

    // Update avatar preview di sebelah kiri
    const avatarEl = document.getElementById('bio-avatar-preview');
    if (avatarEl) {
      avatarEl.innerHTML = `<img src="${pendingPhotoBase64}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"/>`;
    }
  };
  reader.readAsDataURL(file);
}

// FIX 1: Simpan biodata + upload gambar ke Drive, kekal selepas refresh
async function saveBiodataPelajar() {
  const btnSave = document.getElementById('btn-save-biodata');
  btnSave.disabled = true;
  btnSave.textContent = 'Menyimpan...';

  try {
    let gambarUrl = biodataDB[currentPelajar.nokp]?.gambar || null;

    // Upload gambar ke Google Drive jika ada fail baru
    if (pendingPhotoFile) {
      document.getElementById('upload-progress').style.display = 'flex';
      document.getElementById('upload-status-text').textContent = 'Memuat naik gambar ke Drive...';

      gambarUrl = await uploadGambarKeDrive(pendingPhotoFile, currentPelajar.nokp);

      document.getElementById('upload-progress').style.display = 'none';
      document.getElementById('upload-status-text').textContent = 'Gambar berjaya dimuat naik ✓';
      pendingPhotoFile = null;
    }

    // Simpan biodata
    const nokp = currentPelajar.nokp;
    biodataDB[nokp] = {
      jawatan: document.getElementById('bio-jawatan').value,
      kumpulan: document.getElementById('bio-kumpulan').value,
      noDlmKumpulan: document.getElementById('bio-nodlm').value,
      alahan: document.getElementById('bio-alahan').value,
      ubat: document.getElementById('bio-ubat').value,
      notel: document.getElementById('bio-notel').value,
      gambar: gambarUrl
    };

    // Simpan ke Sheets via GAS
    await saveBiodataData(nokp);

    // Update sidebar dengan gambar baru
    buildSidebarPelajar();

    notify('Biodata berjaya disimpan!', 'success');
    pendingPhotoBase64 = null;
  } catch (e) {
    notify('Ralat semasa menyimpan: ' + e.message, 'error');
  } finally {
    btnSave.disabled = false;
    btnSave.textContent = 'Simpan Biodata';
  }
}

function renderPelajarPeer() {
  const p = currentPelajar;
  const bio = biodataDB[p.nokp] || {};
  if (!bio.kumpulan) {
    document.getElementById('main-content').innerHTML = `
      <div class="card">
        <div class="alert alert-info"><span>ℹ</span><span>Sila lengkapkan biodata anda terlebih dahulu dan pilih kumpulan sebelum membuat penilaian rakan.</span></div>
        <button class="btn btn-primary" onclick="navigateTo('pelajar-biodata')">Ke Biodata</button>
      </div>`;
    return;
  }

  const peers = PELAJAR_LIST.filter(peer => {
    const pbio = biodataDB[peer.nokp] || {};
    return peer.nokp !== p.nokp && pbio.kumpulan === bio.kumpulan && peer.kelas === p.kelas;
  });

  const alreadyRated = peerRatingsDB.filter(r=>r.Reviewer_ID===p.agiliran).map(r=>r.Target_ID);

  document.getElementById('main-content').innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Kumpulan ${bio.kumpulan} — ${p.kelas}</div>
      <div class="card-subtitle">${peers.length} rakan dalam kumpulan anda</div>
    </div>
    <div class="grid-2" id="peer-rate-grid">
      ${peers.length===0?`<div class="empty-state"><div class="icon">👥</div><p>Tiada rakan dalam kumpulan yang sama. Pastikan ahli kumpulan telah mengisi biodata mereka.</p></div>`:''}
      ${peers.map(peer=>{
        const rated = alreadyRated.includes(peer.agiliran);
        const pbio = biodataDB[peer.nokp]||{};
        return `<div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            ${renderAvatar(40, peer.nama, pbio.gambar||null)}
            <div>
              <div style="font-size:13px;font-weight:600">${peer.nama.split(' ').slice(0,3).join(' ')}</div>
              <div style="font-size:11px;color:var(--text-secondary)">${peer.kelas} | ${pbio.jawatan||'Ahli'}</div>
            </div>
            ${rated?`<span class="badge badge-green" style="margin-left:auto">Dinilai ✓</span>`:''}
          </div>
          ${rated?`<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:10px">Anda telah menilai rakan ini.</div>`:
          `<div id="rate-form-${peer.nokp}">
            ${['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'].map(dim=>`
            <div style="margin-bottom:10px">
              <div style="font-size:12px;font-weight:500;margin-bottom:5px;color:var(--text-secondary)">${dim}</div>
              <div class="star-group" data-dim="${dim}" data-target="${peer.nokp}">
                ${[1,2,3,4,5].map(n=>`<div class="star" onclick="selectStar(this,${n})" data-val="${n}">${n}</div>`).join('')}
              </div>
            </div>`).join('')}
            <button class="btn btn-primary btn-block" style="margin-top:8px" onclick="submitPeerRating('${peer.nokp}','${peer.agiliran}')">Hantar Penilaian</button>
          </div>`}
        </div>`;
      }).join('')}
    </div>`;
}

function selectStar(el, val) {
  const group = el.closest('.star-group');
  group.querySelectorAll('.star').forEach(s => { s.classList.toggle('selected', parseInt(s.dataset.val) <= val); });
  group.dataset.selected = val;
}

async function submitPeerRating(targetNokp, targetAgiliran) {
  const container = document.getElementById('rate-form-' + targetNokp);
  const dims = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  const record = {
    Timestamp: new Date().toISOString(),
    Reviewer_ID: currentPelajar.agiliran,
    Target_ID: targetAgiliran,
    Siri: 1,
    Kumpulan: (biodataDB[currentPelajar.nokp]||{}).kumpulan||''
  };
  let valid = true;
  dims.forEach(d => {
    const group = container.querySelector(`.star-group[data-dim="${d}"]`);
    if (!group||!group.dataset.selected) { valid = false; return; }
    record[d] = parseFloat(group.dataset.selected);
  });
  if (!valid) { notify('Sila beri markah untuk semua dimensi!', 'error'); return; }
  peerRatingsDB.push(record);
  await savePeerData(record);
  notify('Penilaian dihantar!', 'success');
  renderPelajarPeer();
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

function viewPeerDetail(nokp) {
  const p = PELAJAR_LIST.find(x=>x.nokp===nokp);
  if (!p) return;
  const ratings = peerRatingsDB.filter(r=>r.Target_ID===p.agiliran);
  const dims = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  const avgDims = dims.map(d=>{const vals=ratings.map(r=>parseFloat(r[d])).filter(v=>!isNaN(v));return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;});

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h3>Penilaian Rakan — ${p.nama.split(' ').slice(0,2).join(' ')}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
        <canvas id="spider-modal" height="250"></canvas>
        <div style="margin-top:14px">
          ${dims.map((d,i)=>`<div class="mark-summary-row"><div style="flex:1;font-size:13px;font-weight:500">${d}</div><div style="width:40px;text-align:right;font-size:13px">${avgDims[i].toFixed(1)}/5</div><div style="width:100px;padding-left:8px"><div class="progress-bar"><div class="progress-fill" style="width:${avgDims[i]/5*100}%;background:var(--primary)"></div></div></div></div>`).join('')}
        </div>
        <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-secondary)">Berdasarkan ${ratings.length} penilaian rakan</div>
      </div>
    </div>`;
  setTimeout(()=>buildSpider('spider-modal',dims,avgDims),50);
}
