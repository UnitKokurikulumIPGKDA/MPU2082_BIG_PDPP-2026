<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pemarkahan IPG — MPU2082</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --primary:#185FA5; --primary-light:#E6F1FB; --primary-mid:#378ADD;
  --success:#3B6D11; --success-light:#EAF3DE;
  --warning:#854F0B; --warning-light:#FAEEDA;
  --danger:#A32D2D;  --danger-light:#FCEBEB;
  --purple:#534AB7;  --purple-light:#EEEDFE;
  --teal:#0F6E56;    --teal-light:#E1F5EE;
  --gray-100:#F1EFE8; --gray-200:#D3D1C7;
  --gray-400:#888780; --gray-600:#5F5E5A;
  --text-primary:#1a1a1a; --text-secondary:#5F5E5A;
  --bg:#f7f6f3; --bg-card:#ffffff; --border:#e0ded8;
  --radius:8px; --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;line-height:1.6}

/* ── LOADING OVERLAY ── */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-secondary)}

/* ── AUTH ── */
#screen-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo-icon{width:52px;height:52px;border-radius:12px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.auth-logo h1{font-size:17px;font-weight:600}
.auth-logo p{font-size:12px;color:var(--text-secondary);margin-top:2px}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--text-secondary);transition:all .15s}
.auth-tab.active{background:var(--primary);color:#fff}

/* ── APP SHELL ── */
#app{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-brand{padding:16px;border-bottom:1px solid var(--border)}
.sb-brand h1{font-size:13px;font-weight:600;color:var(--primary);line-height:1.3}
.sb-brand p{font-size:11px;color:var(--text-secondary);margin-top:2px}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-user-name{font-size:12px;font-weight:600}
.sb-user-role{font-size:11px;color:var(--text-secondary)}
.sb-nav{flex:1;padding:6px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .15s,color .15s;margin-bottom:1px}
.nav-item:hover{background:var(--gray-100);color:var(--text-primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-logout:hover{background:var(--danger-light);color:var(--danger)}

/* ── MAIN ── */
.main{margin-left:224px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:15px;font-weight:600}
.content{padding:22px;flex:1}

/* ── COMPONENTS ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.card-p0{padding:0}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px}
.stat-card .lbl{font-size:10px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-card .val{font-size:22px;font-weight:700;color:var(--text-primary)}
.stat-card .sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg-card);color:var(--text-primary);outline:none;transition:border-color .15s,box-shadow .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-mid);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:var(--bg-card);color:var(--text-primary)}
.btn:hover{background:var(--gray-100)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#0d4a8a;border-color:#0d4a8a;color:#fff}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#2a5209;color:#fff}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.b-blue{background:var(--primary-light);color:var(--primary)}
.b-green{background:var(--success-light);color:var(--success)}
.b-amber{background:var(--warning-light);color:var(--warning)}
.b-red{background:var(--danger-light);color:var(--danger)}
.b-purple{background:var(--purple-light);color:var(--purple)}
.b-teal{background:var(--teal-light);color:var(--teal)}
.b-gray{background:var(--gray-100);color:var(--gray-600)}
.alert{padding:10px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.alert-danger{background:var(--danger-light);color:var(--danger);border:1px solid #f0c0c0}
.alert-success{background:var(--success-light);color:var(--success);border:1px solid #c0de97}
.alert-info{background:var(--primary-light);color:var(--primary);border:1px solid #b5d4f4}
.hidden{display:none!important}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--gray-100);padding:9px 11px;text-align:left;font-weight:600;font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg)}
tbody td{padding:8px 11px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}
.mark-input{width:68px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;background:var(--bg-card);color:var(--text-primary);outline:none;transition:border-color .15s}
.mark-input:focus{border-color:var(--primary-mid);box-shadow:0 0 0 2px rgba(55,138,221,.1)}
.mark-input.changed{border-color:#EF9F27;background:#FFFBF3}
.progress-bar{height:6px;background:var(--gray-200);border-radius:10px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:10px;transition:width .3s}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 15px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;overflow:hidden}
.avatar img,.avatar-lg img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-lg{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;overflow:hidden;margin:0 auto 10px}
.info-row{display:flex;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{width:150px;flex-shrink:0;color:var(--text-secondary);font-weight:500}
.info-value{flex:1}
.mark-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.mark-row:last-child{border-bottom:none}
.star-group{display:flex;gap:4px}
.star{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-secondary);transition:all .15s;user-select:none}
.star.on{background:var(--warning-light);color:var(--warning);border-color:#FAC775}
.star:hover{background:var(--warning-light);color:var(--warning)}
.photo-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .15s}
.photo-drop:hover{border-color:var(--primary-mid);background:var(--primary-light)}
.photo-drop .preview{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.empty-state .ic{font-size:36px;margin-bottom:8px;opacity:.4}
.empty-state p{font-size:13px}
.notification{position:fixed;bottom:18px;right:18px;padding:9px 14px;border-radius:var(--radius);font-size:13px;z-index:9999;max-width:280px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h3{font-size:14px;font-weight:600}
.btn-close{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);transition:background .15s}
.btn-close:hover{background:var(--gray-100)}
.gA,.gAp,.gAm{color:var(--success);font-weight:600}
.gB,.gBp,.gBm{color:var(--primary);font-weight:600}
.gC,.gCp,.gCm{color:var(--warning);font-weight:600}
.gD{color:#884400;font-weight:600}
.gF{color:var(--danger);font-weight:600}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:13px 18px;border-bottom:1px solid var(--border)}
.filter-bar input,.filter-bar select{padding:6px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg-card);color:var(--text-primary);outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary-mid)}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Memuatkan sistem...</div>
</div>

<!-- ── AUTH ── -->
<div id="screen-auth" class="hidden">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Sistem Pemarkahan IPG</h1>
      <p>MPU2082 — Pentaksiran Berterusan 2024/2025</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-pensyarah" onclick="switchTab('pensyarah')">Pensyarah</button>
      <button class="auth-tab" id="tab-pelajar" onclick="switchTab('pelajar')">Pelajar</button>
    </div>

    <div id="form-pensyarah">
      <div class="form-group">
        <label>E-mel</label>
        <input type="email" id="auth-email" placeholder="email@ipgm.edu.my" value="hanifffaizal@gmail.com"/>
      </div>
      <div class="form-group">
        <label>Kata Laluan</label>
        <input type="password" id="auth-pass" placeholder="Kata laluan" value="790704025409"/>
      </div>
    </div>

    <div id="form-pelajar" class="hidden">
      <div class="form-group">
        <label>Nombor Kad Pengenalan</label>
        <input type="text" id="auth-nokp" placeholder="cth: 030924080985"/>
      </div>
    </div>

    <div id="auth-err" class="alert alert-danger hidden"></div>

    <button class="btn btn-primary btn-block" id="btn-login" onclick="doLogin()" style="margin-top:6px">
      Log Masuk
    </button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <h1>Sistem Pemarkahan IPG</h1>
      <p>MPU2082 | 2024/2025</p>
    </div>
    <div class="sb-user" id="sb-user"></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <button class="btn-logout" onclick="doLogout()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Keluar
      </button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h2 id="page-title">Papan Pemuka</h2>
      <div id="topbar-right"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="modal-wrap"></div>
<div id="notif" style="display:none" class="notification"></div>

<script>
// ================================================================
// STATE
// ================================================================
let SESSION = null;        // { type, user }
let PELAJAR_CACHE = [];    // list of all students
let MARKAH_CACHE = {};     // { nokp: markahObj }
let UNSAVED_MARKAH = {};   // pending changes from table inputs

// ================================================================
// UTILITY HELPERS
// ================================================================
const $ = id => document.getElementById(id);
const html = (id, h) => { const el = $(id); if (el) el.innerHTML = h; };

function notify(msg, type = 'info') {
  const el = $('notif');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#3B6D11' : type === 'error' ? '#A32D2D' : '#185FA5';
  el.style.color = '#fff';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 3200);
}

function showLoading(msg = 'Memuatkan...') {
  $('loading-overlay').style.display = 'flex';
  $('loading-overlay').querySelector('.loading-text').textContent = msg;
}
function hideLoading() { $('loading-overlay').style.display = 'none'; }

function getInitials(nama) {
  return nama.split(' ').filter(w => /^[A-Za-z]/.test(w)).slice(0, 2).map(w => w[0].toUpperCase()).join('') || nama.slice(0, 2).toUpperCase();
}

const AVATAR_COLORS = [
  ['#E6F1FB','#185FA5'],['#E1F5EE','#0F6E56'],['#EEEDFE','#534AB7'],
  ['#FAEEDA','#854F0B'],['#FAECE7','#993C1D'],['#EAF3DE','#3B6D11']
];
function avatarColor(nama) {
  const i = (nama.charCodeAt(0) || 0) % AVATAR_COLORS.length;
  return AVATAR_COLORS[i];
}

function gredClass(g) {
  if (!g || g === '—') return '';
  if (g === 'A+') return 'gAp';
  if (g === 'A') return 'gA';
  if (g === 'A-') return 'gAm';
  if (g.startsWith('B')) return 'gB';
  if (g.startsWith('C')) return 'gC';
  if (g === 'D') return 'gD';
  return 'gF';
}

function kelasBadge(kelas) {
  if (kelas === 'PBKK') return 'b-blue';
  if (kelas === 'PIMK') return 'b-purple';
  return 'b-teal';
}

function avatarHTML(nama, gambar, size = 32) {
  const [bg, tc] = avatarColor(nama);
  const style = `width:${size}px;height:${size}px;font-size:${Math.round(size*0.38)}px;background:${bg};color:${tc}`;
  const inner = gambar ? `<img src="${gambar}" alt=""/>` : getInitials(nama);
  return `<div class="avatar" style="${style}">${inner}</div>`;
}

// ================================================================
// GAS BRIDGE — memanggil Code.gs handleRequest
// ================================================================
function gasCall(action, payload = {}) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.ok === false) reject(new Error(res.error || 'Ralat tidak diketahui'));
        else resolve(res);
      })
      .withFailureHandler(err => reject(err))
      .handleRequest(action, payload);
  });
}

// ================================================================
// AUTH
// ================================================================
function switchTab(tab) {
  $('tab-pensyarah').classList.toggle('active', tab === 'pensyarah');
  $('tab-pelajar').classList.toggle('active', tab === 'pelajar');
  $('form-pensyarah').classList.toggle('hidden', tab !== 'pensyarah');
  $('form-pelajar').classList.toggle('hidden', tab !== 'pelajar');
  $('auth-err').classList.add('hidden');
}

async function doLogin() {
  $('auth-err').classList.add('hidden');
  const isPensyarah = !$('form-pensyarah').classList.contains('hidden');
  $('btn-login').disabled = true;
  $('btn-login').textContent = 'Mengesahkan...';

  try {
    let payload;
    if (isPensyarah) {
      payload = {
        type: 'pensyarah',
        email: $('auth-email').value.trim(),
        password: $('auth-pass').value.trim()
      };
    } else {
      payload = {
        type: 'pelajar',
        nokp: $('auth-nokp').value.trim()
      };
    }

    const res = await gasCall('login', payload);
    SESSION = res;
    await loadInitialData();
    startApp();

  } catch (e) {
    $('auth-err').textContent = e.message;
    $('auth-err').classList.remove('hidden');
  } finally {
    $('btn-login').disabled = false;
    $('btn-login').textContent = 'Log Masuk';
  }
}

async function loadInitialData() {
  showLoading('Memuatkan data pelajar...');
  const res = await gasCall('getPelajarList');
  PELAJAR_CACHE = res.data || [];

  showLoading('Memuatkan rekod markah...');
  const mRes = await gasCall('getAllMarkah');
  MARKAH_CACHE = {};
  (mRes.data || []).forEach(m => { MARKAH_CACHE[m.nokp] = m; });
}

function doLogout() {
  SESSION = null;
  PELAJAR_CACHE = [];
  MARKAH_CACHE = {};
  UNSAVED_MARKAH = {};
  $('app').classList.add('hidden');
  $('screen-auth').classList.remove('hidden');
}

// ================================================================
// APP SHELL
// ================================================================
function startApp() {
  hideLoading();
  $('screen-auth').classList.add('hidden');
  $('app').classList.remove('hidden');

  if (SESSION.type === 'pensyarah') {
    buildSidebarPensyarah();
    navigateTo('dashboard');
  } else {
    buildSidebarPelajar();
    navigateTo('bio');
  }
}

function buildSidebarPensyarah() {
  const u = SESSION.user;
  const [bg, tc] = avatarColor(u.nama);
  html('sb-user', `
    <div class="avatar" style="width:30px;height:30px;font-size:11px;background:${bg};color:${tc}">${getInitials(u.nama)}</div>
    <div>
      <div class="sb-user-name">${u.nama.split(' ').slice(0,2).join(' ')}</div>
      <div class="sb-user-role">${u.role === 'admin' ? 'Pentadbir' : 'Pensyarah'}</div>
    </div>`);

  const navItems = [
    { id: 'dashboard', label: 'Papan Pemuka',        icon: icoHome() },
    { id: 'pelajar',   label: 'Senarai Pelajar',     icon: icoUsers() },
    { id: 'markah',    label: 'Rekod Markah',         icon: icoCheck() },
    { id: 'laporan',   label: 'Laporan & Analisis',   icon: icoChart() },
    { id: 'peer',      label: 'Penilaian Rakan',      icon: icoStar() },
  ];

function onMarkahInput(el) {
  const nokp = el.dataset.nokp;
  const key = el.dataset.key;
  const val = el.value === '' ? null : Math.min(100, Math.max(0, parseFloat(el.value) || 0));

  if (!UNSAVED_MARKAH[nokp]) UNSAVED_MARKAH[nokp] = {};
  UNSAVED_MARKAH[nokp][key] = val;
  el.classList.add('changed');

  // Live compute
  const base = MARKAH_CACHE[nokp] || {};
  const merged = { ...base, ...UNSAVED_MARKAH[nokp] };
  const calc = hitungMarkahClient(merged);
  const hasMark = Object.values(merged).some(v => v !== null && v !== undefined && v !== '');
  const gred = hasMark ? tentukanGredClient(calc.jumlah) : '—';

  if ($('c1-' + nokp)) $('c1-' + nokp).innerHTML = `<span style="font-size:12px">${hasMark ? calc.hpk1.toFixed(1) : '—'}</span>`;
  if ($('c2-' + nokp)) $('c2-' + nokp).innerHTML = `<span style="font-size:12px">${hasMark ? calc.hpk2.toFixed(1) : '—'}</span>`;
  if ($('c3-' + nokp)) $('c3-' + nokp).innerHTML = `<span style="font-size:12px">${hasMark ? calc.hpk3.toFixed(1) : '—'}</span>`;
  if ($('tot-' + nokp)) $('tot-' + nokp).innerHTML = `<strong style="font-size:13px">${hasMark ? calc.jumlah.toFixed(1) : '—'}</strong>`;
  if ($('gred-' + nokp)) $('gred-' + nokp).innerHTML = `<span class="${gredClass(gred)}">${gred}</span>`;

  const $row = $('row-' + nokp);
  if ($row) $row.style.background = '#FFFBF3';

  // Update unsaved count
  const count = Object.keys(UNSAVED_MARKAH).length;
  const countEl = $('unsaved-count');
  if (countEl) {
    countEl.style.display = count > 0 ? 'inline-flex' : 'none';
    countEl.textContent = count + ' pelajar belum disimpan';
  }
}

async function saveAllMarkah() {
  const btn = $('btn-save-all');
  if (!btn) return;
  if (Object.keys(UNSAVED_MARKAH).length === 0) { notify('Tiada perubahan untuk disimpan.', 'info'); return; }

  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  try {
    const rows = [];
    for (const nokp of Object.keys(UNSAVED_MARKAH)) {
      const p = PELAJAR_CACHE.find(x => x.nokp === nokp);
      if (!p) continue;
      const base = MARKAH_CACHE[nokp] || {};
      const merged = { ...base, ...UNSAVED_MARKAH[nokp] };
      rows.push({
        nokp: p.nokp, nama: p.nama, kelas: p.kelas,
        agiliran: p.agiliran,
        kuiz: merged.kuiz ?? null, hp4: merged.hp4 ?? null,
        hp5: merged.hp5 ?? null, hp3: merged.hp3 ?? null,
        hp8: merged.hp8 ?? null,
        dikemaskiniOleh: SESSION.user.nama
      });
    }

    const res = await gasCall('saveBatchMarkah', { rows });

    // Refresh cache
    const mRes = await gasCall('getAllMarkah');
    MARKAH_CACHE = {};
    (mRes.data || []).forEach(m => { MARKAH_CACHE[m.nokp] = m; });
    UNSAVED_MARKAH = {};

    notify(res.message || 'Markah disimpan!', 'success');
    renderMarkah();

  } catch (e) {
    notify('Ralat: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = icoSave() + ' Simpan Semua'; }
  }
}

    withMark.forEach(r => { const i = Math.min(9, Math.floor(r.jumlah / 10)); buckets[i]++; });

    // Component averages

        </div>
        <div class="card"><div class="card-title" style="margin-bottom:12px">Purata Markah Per Komponen</div><canvas id="ch-lap3" height="130"></canvas></div>

                <th>HPK1</th><th>HPK2</th><th>HPK3</th><th>Jumlah</th><th>Gred</th>

function buildPeerCards(kls) {
  const allRatings = window._allPeerRatings || [];
  const DIMS = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  const filtered = PELAJAR_CACHE.filter(p => kls === 'Semua' || p.kelas === kls);

  html('peer-grid', filtered.map(p => {
    const ratings = allRatings.filter(r => r['Target_ID'] === p.agiliran);
    const avgDims = DIMS.map(d => {
      const vals = ratings.map(r => parseFloat(r[d])).filter(v => !isNaN(v));
      return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    });
    const avg = avgDims.reduce((a, b) => a + b, 0) / 5;
    const [bg, tc] = avatarColor(p.nama);
    return `<div class="card" style="cursor:pointer" onclick="modalPeerDetail('${p.agiliran}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div class="avatar" style="width:36px;height:36px;font-size:12px;background:${bg};color:${tc}">${getInitials(p.nama)}</div>
        <div>
          <div style="font-size:12px;font-weight:600">${p.nama.split(' ').slice(0,3).join(' ')}</div>
          <div style="font-size:11px;color:var(--text-secondary)">${p.kelas} · ${ratings.length} penilaian</div>
        </div>
      </div>
      <canvas id="sp-${p.nokp}" height="150"></canvas>
      <div style="text-align:center;margin-top:6px;font-size:12px;color:var(--text-secondary)">
        Purata: <strong>${avg.toFixed(1)}/5</strong>
      </div>
    </div>`;
  }).join(''));

  setTimeout(() => {
    filtered.forEach(p => {
      const ratings = allRatings.filter(r => r['Target_ID'] === p.agiliran);
      const avgDims = DIMS.map(d => {
        const vals = ratings.map(r => parseFloat(r[d])).filter(v => !isNaN(v));
        return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
      });
      buildSpider('sp-' + p.nokp, DIMS, avgDims);
    });
  }, 50);
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('Gambar melebihi 2MB.'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    window._pendingPhoto = ev.target.result;
    $('photo-prev').innerHTML = `<img src="${window._pendingPhoto}" class="preview"/>><div style="font-size:12px;color:var(--text-secondary)">Gambar dipilih</div>`;
    $('bio-av-prev').innerHTML = `<img src="${window._pendingPhoto}"/>`;
  };
  reader.readAsDataURL(file);
}

async function saveBio() {
  const u = SESSION.user;
  const btn = $('btn-save-bio');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';
  try {
    await gasCall('saveBiodata', {

      jawatan: $('bio-jawatan').value,

    });

  } catch(e) {
    notify('Ralat: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simpan Biodata';
  }
}

                    </div>
                  </div>`).join('')}
                  <button class="btn btn-primary btn-block" style="margin-top:6px"
                    onclick="submitRating('${peer.nokp}','${peer.agiliran}','${bio.kumpulan}')">Hantar Penilaian</button>

function pickStar(el, val) {
  const group = el.closest('.star-group');
  group.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.val) <= val);
  });
  group.dataset.sel = val;
}

async function submitRating(targetNokp, targetAgiliran, kumpulan) {
  const container = $('rf-' + targetNokp);
  const DIMS = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  const payload = {
    reviewerId: SESSION.user.agiliran,
    targetId: targetAgiliran,
    siri: 1, kumpulan
  };
  let valid = true;
  DIMS.forEach(d => {
    const group = container.querySelector(`.star-group[data-dim="${d}"]`);
    if (!group || !group.dataset.sel) { valid = false; return; }
    payload[d.toLowerCase()] = parseFloat(group.dataset.sel);
  });
  // Map to correct keys
  payload.kepimpinan = payload.kepimpinan;
  payload.kerjasama  = payload.kerjasama;
  payload.komunikasi = payload.komunikasi;
  payload.komitmen   = payload.komitmen;
  payload.sahsiah    = payload.sahsiah;

  if (!valid) { notify('Sila beri markah untuk semua dimensi!', 'error'); return; }

  try {
    await gasCall('savePeerRating', payload);
    notify('Penilaian dihantar!', 'success');
    renderPeerHantar();
  } catch(e) { notify('Ralat: ' + e.message, 'error'); }
}

// ================================================================
// SPIDER CHART
// ================================================================
function buildSpider(canvasId, labels, data) {
  const existing = Chart.getChart(canvasId);
  if (existing) existing.destroy();
  const el = $(canvasId);
  if (!el) return;
  new Chart(el, {
    type: 'radar',
    data: { labels, datasets: [{
      data,
      fill: true,
      backgroundColor: 'rgba(55,138,221,.12)',
      borderColor: '#378ADD',
      pointBackgroundColor: '#378ADD',
      pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff',
      pointHoverBorderColor: '#378ADD'
    }]},
    options: {
      scales: { r: { min: 0, max: 5, ticks: { stepSize: 1, font: { size: 9 } }, pointLabels: { font: { size: 10 } } } },
      plugins: { legend: { display: false } }, responsive: true
    }
  });
}

          <div style="font-size:14px;font-weight:600;margin-top:6px">${p.nama}</div>
          <span class="badge ${kelasBadge(p.kelas)}" style="margin-top:4px">${p.kelas}</span>
        </div>
        <div class="info-row"><div class="info-label">Angka Giliran</div><div class="info-value">${p.agiliran}</div></div>
        <div class="info-row"><div class="info-label">No. KP</div><div class="info-value">${p.nokp}</div></div>
        <div class="info-row"><div class="info-label">Jantina</div><div class="info-value">${p.jantina === 'L' ? 'Lelaki' : 'Perempuan'}</div></div>
        ${bio.jawatan ? `<div class="info-row"><div class="info-label">Jawatan</div><div class="info-value">${bio.jawatan}</div></div>` : ''}
        ${bio.kumpulan ? `<div class="info-row"><div class="info-label">Kumpulan</div><div class="info-value">${bio.kumpulan}</div></div>` : ''}
        ${bio.alahan ? `<div class="info-row"><div class="info-label">Alahan</div><div class="info-value">${bio.alahan}</div></div>` : ''}
        ${bio.noTelKecemasan ? `<div class="info-row"><div class="info-label">No. Tel Kecemasan</div><div class="info-value">${bio.noTelKecemasan}</div></div>` : ''}
        <hr class="divider">
        <div class="grid-3" style="gap:8px;margin-bottom:12px">
          <div class="stat-card"><div class="lbl">HPK1</div><div class="val" style="font-size:17px">${m && m.hpk1 !== null ? Number(m.hpk1).toFixed(1) : '—'}</div></div>
          <div class="stat-card"><div class="lbl">HPK2</div><div class="val" style="font-size:17px">${m && m.hpk2 !== null ? Number(m.hpk2).toFixed(1) : '—'}</div></div>
          <div class="stat-card"><div class="lbl">HPK3</div><div class="val" style="font-size:17px">${m && m.hpk3 !== null ? Number(m.hpk3).toFixed(1) : '—'}</div></div>
        </div>
        <div style="text-align:center">
          <span style="font-size:24px;font-weight:700" class="${gredClass(gred)}">${m && m.jumlah !== null ? Number(m.jumlah).toFixed(1) : '—'}</span>
          <span style="font-size:14px;color:var(--text-secondary);margin-left:8px">Gred <strong class="${gredClass(gred)}">${gred}</strong></span>
        </div>
      </div>
    </div>`);
}

async function modalPeerDetail(targetAgiliran) {
  const DIMS = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  let ratings = [];
  try { const r = await gasCall('getPeerRatings', { targetId: targetAgiliran }); ratings = r.data || []; } catch(e) {}
  const avgDims = DIMS.map(d => {
    const vals = ratings.map(r => parseFloat(r[d])).filter(v => !isNaN(v));
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  });
  const p = PELAJAR_CACHE.find(x => x.agiliran === targetAgiliran) || {};

  html('modal-wrap', `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h3>Penilaian Rakan — ${(p.nama||'').split(' ').slice(0,3).join(' ')}</h3>
          <button class="btn-close" onclick="closeModal()">×</button>
        </div>
        <canvas id="sp-modal" height="240"></canvas>
        <div style="margin-top:14px">
          ${DIMS.map((d, i) => `
          <div class="mark-row">
            <div style="flex:1;font-size:13px;font-weight:500">${d}</div>
            <div style="width:45px;text-align:right;font-size:12px">${avgDims[i].toFixed(1)}/5</div>
            <div style="width:100px;padding-left:8px">
              <div class="progress-bar"><div class="progress-fill" style="width:${avgDims[i]/5*100}%;background:var(--primary)"></div></div>
            </div>
          </div>`).join('')}
        </div>
        <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-secondary)">
          Berdasarkan ${ratings.length} penilaian rakan
        </div>
      </div>
    </div>`);
  setTimeout(() => buildSpider('sp-modal', DIMS, avgDims), 50);
}

function closeModal() { html('modal-wrap', ''); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ================================================================
// CLIENT-SIDE MARKAH CALCULATION (mirror of Code.gs)
// ================================================================
function hitungMarkahClient(m) {
  const k   = parseFloat(m.kuiz) || 0;
  const hp4 = parseFloat(m.hp4) || 0;
  const hp5 = parseFloat(m.hp5) || 0;
  const hp3 = parseFloat(m.hp3) || 0;
  const hp8 = parseFloat(m.hp8) || 0;
  const hpk1 = +(k   * 0.10).toFixed(2);
  const hpk2 = +(hp4 * 0.30 + hp5 * 0.30).toFixed(2);
  const hpk3 = +(hp3 * 0.15 + hp8 * 0.15).toFixed(2);
  const jumlah = +(hpk1 + hpk2 + hpk3).toFixed(2);
  return { hpk1, hpk2, hpk3, jumlah };
}

function tentukanGredClient(j) {
  if (j >= 90) return 'A+';  if (j >= 80) return 'A';
  if (j >= 75) return 'A-';  if (j >= 70) return 'B+';
  if (j >= 65) return 'B';   if (j >= 60) return 'B-';
  if (j >= 55) return 'C+';  if (j >= 50) return 'C';
  if (j >= 45) return 'C-';  if (j >= 40) return 'D';
  return 'F';
}
