<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pemarkahan IPG — MPU2082</title>
<!-- Font Curation: Lora (Editorial Serif) & Outfit (Modern Data Sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  /* Editorial Color Palette */
  --bg-base: #F7F6F2;
  --bg-surface: #FFFFFF;
  --fg-primary: #121417;
  --fg-muted: #64676C;
  --border-color: #D6D4CE;
  --border-focus: #112A46;
  
  --brand-primary: #112A46; /* Deep Academic Blue */
  --brand-secondary: #E3E0D8;
  
  --accent-success: #24583C;
  --accent-success-bg: #E7F0EB;
  --accent-warning: #914F15;
  --accent-warning-bg: #F8EFE7;
  --accent-danger: #822020;
  --accent-danger-bg: #F4E7E7;
  --accent-info: #224E7D;
  --accent-info-bg: #E8EFF5;

  --font-heading: 'Lora', serif;
  --font-body: 'Outfit', sans-serif;
  
  --radius-sm: 2px;
  --radius-md: 6px;
  --radius-lg: 12px;
  
  --shadow-subtle: 0 4px 12px rgba(0,0,0,0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg-base); color: var(--fg-primary); min-height: 100vh; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; letter-spacing: -0.01em; color: var(--fg-primary); }

/* ── LOADING OVERLAY ── */
#loading-overlay { position: fixed; inset: 0; background: var(--bg-base); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.4s ease; text-align: center; padding: 20px;}
.spinner { width: 44px; height: 44px; border: 2px solid var(--border-color); border-top-color: var(--brand-primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--font-heading); font-style: italic; font-size: 16px; color: var(--brand-primary); max-width: 400px; }

/* ── AUTH SCREEN (Editorial Split Layout) ── */
#screen-auth { min-height: 100vh; display: flex; background: var(--bg-base); }
.auth-visual { flex: 1; background: var(--brand-primary); color: white; padding: 60px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
.auth-visual::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 24px 24px; opacity: 0.4; pointer-events: none; }
.auth-visual h2 { color: white; font-size: 42px; line-height: 1.2; font-weight: 500; margin-top: auto; max-width: 400px; z-index: 1; }
.auth-visual p { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 16px; z-index: 1; font-family: var(--font-body); font-weight: 300; }
.auth-panel { width: 100%; max-width: 480px; background: var(--bg-surface); padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; box-shadow: -10px 0 30px rgba(0,0,0,0.02); }
@media (max-width: 768px) { .auth-visual { display: none; } .auth-panel { max-width: 100%; padding: 30px; } }

.auth-logo { margin-bottom: 32px; }
.auth-logo h1 { font-size: 24px; margin-bottom: 6px; }
.auth-logo p { font-size: 13px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }

.auth-tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--fg-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s ease; }
.auth-tab.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }

/* ── APP SHELL ── */
#app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
.sb-brand { padding: 24px; border-bottom: 1px solid var(--border-color); }
.sb-brand h1 { font-size: 18px; line-height: 1.2; }
.sb-brand p { font-size: 11px; color: var(--fg-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.sb-user { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
.sb-user-name { font-size: 14px; font-weight: 600; color: var(--fg-primary); }
.sb-user-role { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
.sb-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius-md); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--fg-muted); transition: all 0.2s; margin-bottom: 4px; }
.nav-item:hover { background: var(--bg-base); color: var(--fg-primary); }
.nav-item.active { background: var(--brand-primary); color: white; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sb-footer { padding: 16px; border-top: 1px solid var(--border-color); }

.btn-logout { width: 100%; padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: transparent; color: var(--fg-primary); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.btn-logout:hover { background: var(--accent-danger-bg); color: var(--accent-danger); border-color: var(--accent-danger-bg); }

/* ── MAIN CONTENT ── */
.main { margin-left: 260px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-base); }
.topbar { background: var(--bg-base); padding: 24px 36px 12px; display: flex; align-items: flex-end; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h2 { font-size: 28px; font-weight: 500; color: var(--fg-primary); }
.content { padding: 24px 36px 48px; flex: 1; max-width: 1400px; }

/* ── COMPONENTS ── */
.card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-subtle); transition: border-color 0.3s; }
.card-p0 { padding: 0; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.card-title { font-family: var(--font-heading); font-size: 18px; font-weight: 600; color: var(--brand-primary); }
.card-sub { font-size: 13px; color: var(--fg-muted); margin-top: 4px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* Editorial Stat Card */
.stat-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 20px; position: relative; overflow: hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background: var(--brand-secondary); transition: background 0.3s; }
.stat-card:hover::before { background: var(--brand-primary); }
.stat-card .lbl { font-size: 11px; color: var(--fg-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.stat-card .val { font-family: var(--font-heading); font-size: 32px; font-weight: 400; color: var(--fg-primary); line-height: 1; }
.stat-card .sub { font-size: 12px; color: var(--fg-muted); margin-top: 8px; font-weight: 500; }

/* Forms */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--fg-primary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); background: var(--bg-surface); color: var(--fg-primary); outline: none; transition: all 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 1px var(--border-focus); }

/* Buttons */
.btn { padding: 10px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; background: var(--bg-surface); color: var(--fg-primary); text-transform: uppercase; letter-spacing: 0.05em; }
.btn:hover { background: var(--bg-base); border-color: var(--fg-primary); }
.btn-primary { background: var(--brand-primary); color: #fff; border-color: var(--brand-primary); }
.btn-primary:hover { background: #0A1929; border-color: #0A1929; color: #fff; }
.btn-success { background: var(--accent-success); color: #fff; border-color: var(--accent-success); }
.btn-success:hover { background: #1B422D; color: #fff; }
.btn-block { width: 100%; }
.btn-sm { padding: 6px 14px; font-size: 11px; }
.btn-xs { padding: 4px 10px; font-size: 11px; }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.b-blue { background: var(--accent-info-bg); color: var(--accent-info); }
.b-green { background: var(--accent-success-bg); color: var(--accent-success); }
.b-amber { background: var(--accent-warning-bg); color: var(--accent-warning); }
.b-red { background: var(--accent-danger-bg); color: var(--accent-danger); }
.b-gray { background: var(--brand-secondary); color: var(--fg-muted); }

/* Alerts */
.alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; border-left: 3px solid; }
.alert-danger { background: var(--accent-danger-bg); color: var(--accent-danger); border-left-color: var(--accent-danger); }
.alert-success { background: var(--accent-success-bg); color: var(--accent-success); border-left-color: var(--accent-success); }
.alert-info { background: var(--accent-info-bg); color: var(--accent-info); border-left-color: var(--accent-info); }

.hidden { display: none !important; }
.divider { border: none; border-top: 1px solid var(--border-color); margin: 20px 0; }

/* Tables (Editorial Minimalist) */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: var(--bg-surface); padding: 14px 16px; text-align: left; font-weight: 600; font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--fg-primary); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
tbody tr:hover { background: var(--bg-base); }
tbody td { padding: 14px 16px; vertical-align: middle; }
tbody tr:last-child { border-bottom: none; }

/* Inputs in table */
.mark-input { width: 72px; padding: 6px 8px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); font-weight: 500; text-align: center; background: var(--bg-surface); color: var(--fg-primary); outline: none; transition: all 0.2s; }
.mark-input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 1px var(--brand-primary); }
.mark-input.changed { border-color: var(--accent-warning); background: var(--accent-warning-bg); color: var(--accent-warning); }

.progress-bar { height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; gap: 24px; }
.tab { padding: 0 0 12px 0; font-size: 14px; font-weight: 600; color: var(--fg-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.05em; }
.tab:hover { color: var(--fg-primary); }
.tab.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }

/* Avatars */
.avatar { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; font-family: var(--font-heading); flex-shrink: 0; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
.avatar img, .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.avatar-lg { width: 80px; height: 80px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 500; font-family: var(--font-heading); overflow: hidden; margin: 0 auto 16px; border: 1px solid rgba(0,0,0,0.05); }

/* Rows & Stars */
.info-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border-color); font-size: 14px; }
.info-row:last-child { border-bottom: none; }
.info-label { width: 140px; flex-shrink: 0; color: var(--fg-muted); font-weight: 500; }
.info-value { flex: 1; font-weight: 500; color: var(--fg-primary); }

.mark-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
.mark-row:last-child { border-bottom: none; }

.star-group { display: flex; gap: 6px; }
.star { width: 32px; height: 32px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--fg-muted); transition: all 0.15s; user-select: none; }
.star.on { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
.star:hover { border-color: var(--brand-primary); color: var(--brand-primary); }

.photo-drop { border: 1px dashed var(--fg-muted); border-radius: var(--radius-sm); padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg-base); }
.photo-drop:hover { border-color: var(--brand-primary); background: var(--accent-info-bg); }
.photo-drop .preview { width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover; margin: 0 auto 12px; display: block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--fg-muted); }
.empty-state .ic { font-size: 32px; margin-bottom: 12px; opacity: 0.5; filter: grayscale(1); }
.empty-state p { font-size: 14px; font-weight: 500; }

.notification { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; z-index: 9999; max-width: 320px; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-left: 4px solid; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Modals */
.modal-overlay { position: fixed; inset: 0; background: rgba(18, 20, 23, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; animation: fadeIn 0.2s forwards; }
@keyframes fadeIn { to { opacity: 1; } }
.modal { background: var(--bg-surface); border-radius: var(--radius-sm); border: 1px solid var(--border-color); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); transform: translateY(10px); animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
@keyframes modalSlide { to { transform: translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; border-bottom: 2px solid var(--fg-primary); padding-bottom: 12px; }
.modal-header h3 { font-family: var(--font-heading); font-size: 20px; font-weight: 600; color: var(--fg-primary); }
.btn-close { width: 28px; height: 28px; border: none; background: var(--bg-base); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--fg-muted); transition: all 0.2s; }
.btn-close:hover { background: var(--border-color); color: var(--fg-primary); }

/* Typography Colors */
.gA, .gAp, .gAm { color: var(--accent-success); font-weight: 700; }
.gB, .gBp, .gBm { color: var(--accent-info); font-weight: 700; }
.gC, .gCp, .gCm { color: var(--accent-warning); font-weight: 700; }
.gD { color: #A84C00; font-weight: 700; }
.gF { color: var(--accent-danger); font-weight: 700; }

.filter-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 16px 24px; border-bottom: 1px solid var(--border-color); background: var(--bg-base); }
.filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body); background: var(--bg-surface); outline: none; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 1px var(--brand-primary); }
</style>
</head>

<script>
// ================================================================
// STATE
// ================================================================
let SESSION = null;        
let PELAJAR_CACHE = [];    
let MARKAH_CACHE = {};     
let UNSAVED_MARKAH = {};   

// ================================================================
// UTILITY HELPERS
// ================================================================
const $ = id => document.getElementById(id);
const html = (id, h) => { const el = $(id); if (el) el.innerHTML = h; };

function notify(msg, type = 'info') {
  const el = $('notif');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'success' ? '#E7F0EB' : type === 'error' ? '#F4E7E7' : '#E8EFF5';
  el.style.color = type === 'success' ? '#24583C' : type === 'error' ? '#822020' : '#112A46';
  el.style.borderLeftColor = type === 'success' ? '#24583C' : type === 'error' ? '#822020' : '#112A46';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function showLoading(msg = 'Memuatkan...') {
  $('loading-overlay').style.opacity = '1';
  $('loading-overlay').style.display = 'flex';
  const textEl = $('loading-overlay').querySelector('.loading-text');
  if (textEl) textEl.textContent = msg;
}
function hideLoading() { 
  $('loading-overlay').style.opacity = '0';
  setTimeout(() => $('loading-overlay').style.display = 'none', 400); 
}

function getInitials(nama) {
  return nama.split(' ').filter(w => /^[A-Za-z]/.test(w)).slice(0, 2).map(w => w[0].toUpperCase()).join('') || nama.slice(0, 2).toUpperCase();
}

// Editorial colors for avatars
const AVATAR_COLORS = [
  ['#E8EFF5','#112A46'],['#E7F0EB','#24583C'],['#F8EFE7','#914F15'],
  ['#F4E7E7','#822020'],['#EBE9E1','#4A473E'],['#E3E0D8','#2C2B26']
];
function avatarColor(nama) {
  const i = (nama.charCodeAt(0) || 0) % AVATAR_COLORS.length;
  return AVATAR_COLORS[i];
}

function gredClass(g) {
  if (!g || g === '—') return '';
  if (g === 'A+') return 'gAp';
  if (g === 'A') return 'gA';
  if (g === 'A-') return 'gAm';
  if (g.startsWith('B')) return 'gB';
  if (g.startsWith('C')) return 'gC';
  if (g === 'D') return 'gD';
  return 'gF';
}

function kelasBadge(kelas) {
  if (kelas === 'PBKK') return 'b-blue';
  if (kelas === 'PIMK') return 'b-gray';
  return 'b-green';
}

function avatarHTML(nama, gambar, size = 36) {
  const [bg, tc] = avatarColor(nama);
  const style = `width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px;background:${bg};color:${tc}`;
  const inner = gambar ? `<img src="${gambar}" alt=""/>` : getInitials(nama);
  return `<div class="avatar" style="${style}">${inner}</div>`;
}

// ================================================================
// GAS BRIDGE
// ================================================================
function gasCall(action, payload = {}) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.ok === false) reject(new Error(res.error || 'Ralat pelayan.'));
        else resolve(res);
      })
      .withFailureHandler(err => reject(err))
      .handleRequest(action, payload);
  });
}

function switchTab(tab) {
  $('tab-pensyarah').classList.toggle('active', tab === 'pensyarah');
  $('tab-pelajar').classList.toggle('active', tab === 'pelajar');
  $('form-pensyarah').classList.toggle('hidden', tab !== 'pensyarah');
  $('form-pelajar').classList.toggle('hidden', tab !== 'pelajar');
  $('auth-err').classList.add('hidden');
}

async function doLogin() {
  $('auth-err').classList.add('hidden');
  const isPensyarah = !$('form-pensyarah').classList.contains('hidden');
  $('btn-login').disabled = true;
  $('btn-login').textContent = 'Mengesahkan...';

  try {
    let payload;
    if (isPensyarah) {
      payload = { type: 'pensyarah', email: $('auth-email').value.trim(), password: $('auth-pass').value.trim() };
    } else {
      // Hilangkan sebarang spasi atau simbol pelik pada input KP
      const cleanNokp = $('auth-nokp').value.replace(/['\s]/g, '');
      payload = { type: 'pelajar', nokp: cleanNokp };
    }

    const res = await gasCall('login', payload);
    SESSION = res;
    await loadInitialData();
    startApp();

  } catch (e) {
    $('auth-err').textContent = e.message;
    $('auth-err').classList.remove('hidden');
  } finally {
    $('btn-login').disabled = false;
    $('btn-login').textContent = 'Akses Sistem';
  }
}

async function loadInitialData() {
  showLoading('Menyelaras data pengguna...');
  const res = await gasCall('getPelajarList');
  PELAJAR_CACHE = res.data || [];

  showLoading('Memuatkan rekod pemarkahan...');
  const mRes = await gasCall('getAllMarkah');
  MARKAH_CACHE = {};
  (mRes.data || []).forEach(m => { MARKAH_CACHE[m.nokp] = m; });
}

function doLogout() {
  SESSION = null; PELAJAR_CACHE = []; MARKAH_CACHE = {}; UNSAVED_MARKAH = {};
  window._GLOBAL_BIODATA_MAP = null;
  $('app').classList.add('hidden');
  $('screen-auth').classList.remove('hidden');
}

// ================================================================
// APP SHELL
// ================================================================
function startApp() {
  hideLoading();
  $('screen-auth').classList.add('hidden');
  $('app').classList.remove('hidden');

  if (SESSION.type === 'pensyarah') {
    buildSidebarPensyarah();
    navigateTo('dashboard');
  } else {
    buildSidebarPelajar();
    navigateTo('bio');
  }
}

    </div>`);

    { id: 'peer-hantar', label: 'Penilaian Rakan',  icon: icoStar() }

function navigateTo(screen) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = $('nav-' + screen);
  if (navEl) navEl.classList.add('active');

  const titles = {
    dashboard: 'Ringkasan Eksekutif', pelajar: 'Daftar Pelajar',
    markah: 'Kemasukan Markah', laporan: 'Analisis Pencapaian',
    peer: 'Penilaian Sahsiah (Rakan Sebaya)',
    bio: 'Profil Akademik', 'peer-hantar': 'Penilaian Rakan Sebaya'
  };
  $('page-title').textContent = titles[screen] || screen;

  const screens = {
    dashboard: renderDashboard, pelajar: renderPelajar,
    markah: renderMarkah, laporan: renderLaporan,
    peer: renderPeerView,
    bio: renderBio, 'peer-hantar': renderPeerHantar
  };
  if (screens[screen]) screens[screen]();
}

  try {
    const res = await gasCall('getDashboard');
    const d = res.data;
    
    const gradeColors = { A:'#24583C', B:'#224E7D', C:'#914F15', D:'#822020', F:'#4A473E' };

    html('content', `
      <div class="grid-4" style="margin-bottom:24px">
        <div class="stat-card"><div class="lbl">Populasi Pelajar</div><div class="val">${d.jumlahPelajar}</div><div class="sub">Keseluruhan kohort</div></div>
        <div class="stat-card"><div class="lbl">Kadar Respons</div><div class="val">${d.peratusLengkap}%</div><div class="sub">${d.rekodDimasuk} rekod telah diproses</div></div>
        <div class="stat-card"><div class="lbl">Purata Prestasi</div><div class="val">${d.purataMark || '—'}</div><div class="sub">Markah keseluruhan</div></div>
        <div class="stat-card"><div class="lbl">Penilaian Rakan</div><div class="val">${d.totalPeer}</div><div class="sub">Borang dihantar</div></div>
      </div>
      
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><div><div class="card-title">Taburan Gred Keseluruhan</div><div class="card-sub">Prestasi mengikut skala Abjad</div></div></div>
          <canvas id="ch-grade" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-header"><div><div class="card-title">Demografi Kelas</div></div></div>
          <div style="display:flex; justify-content:center; align-items:center; height: 220px;">
             <canvas id="ch-kelas" height="220"></canvas>
          </div>
        </div>
      </div>
    `);

    setTimeout(() => {
      const gradeLabels = Object.keys(d.gradeDist).sort();
      const gradeData = gradeLabels.map(k => d.gradeDist[k]);
      new Chart($('ch-grade'), {
        type:'bar',
        data:{ labels:gradeLabels, datasets:[{ data:gradeData,
          backgroundColor:gradeLabels.map(g => gradeColors[g]||'#D6D4CE'),
          borderRadius: 2, borderSkipped:false }]},
        options:{ 
          plugins:{ legend:{ display:false } },

      });
    }, 100);

  } catch (e) { html('content', `<div class="alert alert-danger"><span>⚠</span><span>${e.message}</span></div>`); }
}

async function renderPelajar() {
  html('content', `
    <div class="card card-p0" style="overflow: hidden;">
      <div class="filter-bar">
        <input id="q-pelajar" type="text" placeholder="Pencarian nama / angka giliran..." style="flex:1;min-width:250px">
        <select id="f-kelas">
          <option>Semua Kelas</option><option>PBKK</option><option>PIMK</option><option>PMO</option>
        </select>
        <span id="count-pelajar" class="badge b-gray">— pelajar</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width: 40px">#</th>
            <th>Nama Pelajar</th>
            <th>Angka Giliran</th>
            <th>Kelas</th>
            <th>Jantina</th>
            <th>Biodata</th>
            <th style="text-align: right">Markah</th>
            <th style="text-align: center">Gred</th>
            <th style="width: 60px"></th>
          </tr></thead>
          <tbody id="tbody-pelajar"></tbody>
        </table>
      </div>
    </div>`);

  let biodataMap = {};
  try {
    const bRes = await gasCall('getLaporan');
    (bRes.data || []).forEach(r => { biodataMap[r.nokp] = r; });
    window._GLOBAL_BIODATA_MAP = biodataMap; 
  } catch(e) {}

  function renderRows() {
    const q = $('q-pelajar').value.toLowerCase();
    const kls = $('f-kelas').value;
    const filtered = PELAJAR_CACHE.filter(p => {
      const mq = !q || p.nama.toLowerCase().includes(q) || p.agiliran.toLowerCase().includes(q);
      const mk = kls === 'Semua Kelas' || p.kelas === kls;
      return mq && mk;
    });
    $('count-pelajar').textContent = filtered.length + ' Entri';
    
    html('tbody-pelajar', filtered.map((p, i) => {
      const m = MARKAH_CACHE[p.nokp];
      const bio = biodataMap[p.nokp] || {};
      const hasBio = !!(bio.jawatan);
      const hasMark = !!(m && m.jumlah !== null);
      const gred = hasMark ? m.gred : '—';
      return `<tr>
        <td style="color:var(--fg-muted);font-size:12px">${i+1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:12px">
            ${avatarHTML(p.nama, bio.urlGambar, 32)}
            <span style="font-weight:600; color:var(--brand-primary)">${p.nama}</span>
          </div>
        </td>
        <td style="color:var(--fg-muted); font-variant-numeric: tabular-nums;">${p.agiliran}</td>
        <td><span class="badge ${kelasBadge(p.kelas)}">${p.kelas}</span></td>
        <td style="color:var(--fg-muted)">${p.jantina === 'L' ? 'Lelaki' : 'Perp.'}</td>
        <td><span class="badge ${hasBio ? 'b-gray' : ''}" style="${!hasBio ? 'opacity:0.3' : ''}">${hasBio ? 'Lengkap' : '—'}</span></td>
        <td style="text-align: right; font-weight: 600; font-family: var(--font-heading); font-size: 15px;">${hasMark ? Number(m.jumlah).toFixed(1) : '—'}</td>
        <td style="text-align: center"><span class="${gredClass(gred)}">${gred}</span></td>
        <td><button class="btn btn-xs" onclick="modalPelajar('${p.nokp}')">Lihat</button></td>
      </tr>`;
    }).join('') || '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--fg-muted);font-style:italic;">Tiada entri pelajar dijumpai.</td></tr>');
  }

  $('q-pelajar').addEventListener('input', renderRows);
  $('f-kelas').addEventListener('change', renderRows);
  renderRows();
}

function onMarkahInput(el) {
  const nokp = el.dataset.nokp;
  const key = el.dataset.key;
  const val = el.value === '' ? null : Math.min(100, Math.max(0, parseFloat(el.value) || 0));

  if (!UNSAVED_MARKAH[nokp]) UNSAVED_MARKAH[nokp] = {};
  UNSAVED_MARKAH[nokp][key] = val;
  el.classList.add('changed');

  const base = MARKAH_CACHE[nokp] || {};
  const merged = { ...base, ...UNSAVED_MARKAH[nokp] };
  const calc = hitungMarkahClient(merged);
  const hasMark = Object.values(merged).some(v => v !== null && v !== undefined && v !== '');
  const gred = hasMark ? tentukanGredClient(calc.jumlah) : '—';

  if ($('tot-' + nokp)) $('tot-' + nokp).textContent = hasMark ? calc.jumlah.toFixed(1) : '—';
  if ($('gred-' + nokp)) $('gred-' + nokp).innerHTML = `<span class="${gredClass(gred)}">${gred}</span>`;

  const $row = $('row-' + nokp);
  if ($row) $row.style.background = 'var(--accent-warning-bg)';

  const count = Object.keys(UNSAVED_MARKAH).length;
  const countEl = $('unsaved-count');
  if (countEl) {
    countEl.style.display = count > 0 ? 'inline-flex' : 'none';
    countEl.textContent = count + ' draf';
  }
}

async function saveAllMarkah() {
  const btn = $('btn-save-all');
  if (!btn) return;
  if (Object.keys(UNSAVED_MARKAH).length === 0) { notify('Tiada draf baru.', 'info'); return; }

  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  try {
    const rows = [];
    for (const nokp of Object.keys(UNSAVED_MARKAH)) {
      const p = PELAJAR_CACHE.find(x => x.nokp === nokp);
      if (!p) continue;
      const base = MARKAH_CACHE[nokp] || {};
      const merged = { ...base, ...UNSAVED_MARKAH[nokp] };
      rows.push({
        nokp: p.nokp, nama: p.nama, kelas: p.kelas, agiliran: p.agiliran,
        kuiz: merged.kuiz ?? null, hp4: merged.hp4 ?? null, hp5: merged.hp5 ?? null, 
        hp3: merged.hp3 ?? null, hp8: merged.hp8 ?? null, dikemaskiniOleh: SESSION.user.nama
      });
    }

    const res = await gasCall('saveBatchMarkah', { rows });

    const mRes = await gasCall('getAllMarkah');
    MARKAH_CACHE = {};
    (mRes.data || []).forEach(m => { MARKAH_CACHE[m.nokp] = m; });
    UNSAVED_MARKAH = {};

    notify(res.message || 'Rekod selamat disimpan.', 'success');
    renderMarkah();

  } catch (e) {
    notify('Ralat: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = icoSave() + ' Simpan Rekod'; }
  }
}

      return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    });

          <div style="font-size:12px;color:var(--fg-muted);margin-top:2px;">${p.kelas} · ${ratings.length} set dinilai</div>
        </div>
      </div>
      <canvas id="sp-${p.nokp}" height="160"></canvas>
      <div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px dashed var(--border-color);">
        <span style="font-size:12px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:0.05em">Indeks Purata</span><br>
        <span style="font-family:var(--font-heading);font-size:24px;font-weight:600;color:var(--brand-primary);">${avg.toFixed(1)}</span><span style="color:var(--fg-muted)">/5</span>
      </div>
    </div>`;
  }).join(''));

  setTimeout(() => {
    filtered.forEach(p => {
      const ratings = allRatings.filter(r => r['Target_ID'] === p.agiliran);
      const avgDims = DIMS.map(d => {
        const vals = ratings.map(r => parseFloat(r[d])).filter(v => !isNaN(v));
        return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
      });
      buildSpider('sp-' + p.nokp, DIMS, avgDims);
    });
  }, 100);
}

// ── SISTEM PEMAMPATAN GAMBAR (IMAGE COMPRESSOR) ──
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      // Mengecilkan dimensi gambar secara automatik
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const MAX_SIZE = 150; // Mengekalkan saiz resolusi rendah yang tajam (mengelakkan error > 50k aksara)
      let width = img.width;
      let height = img.height;

      if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
      else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);

      // Mampatkan terus ke kualiti 60% (Sangat ringan untuk Google Sheets)
      const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

      window._pendingPhoto = dataUrl;
      $('photo-prev').innerHTML = `<img src="${dataUrl}" class="preview" style="border-radius:12px;"/><div style="font-size:13px;font-weight:500;color:var(--brand-primary)">Profil telah dimampatkan & sedia disimpan</div>`;
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

function pickStar(el, val) {
  const group = el.closest('.star-group');
  group.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.val) <= val);
  });
  group.dataset.sel = val;
}

async function submitRating(targetNokp, targetAgiliran, kumpulan) {
  const container = $('rf-' + targetNokp);
  const DIMS = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  const payload = { reviewerId: SESSION.user.agiliran, targetId: targetAgiliran, siri: 1, kumpulan };
  let valid = true;
  DIMS.forEach(d => {
    const group = container.querySelector(`.star-group[data-dim="${d}"]`);
    if (!group || !group.dataset.sel) { valid = false; return; }
    payload[d.toLowerCase()] = parseFloat(group.dataset.sel);
  });

  if (!valid) { notify('Mohon lengkapkan semua kriteria penilaian.', 'error'); return; }

  try {
    await gasCall('savePeerRating', payload);
    notify('Borang dinilai dan dihantar.', 'success');
    renderPeerHantar();
  } catch(e) { notify('Ralat pelayan.', 'error'); }
}

function buildSpider(canvasId, labels, data) {
  const existing = Chart.getChart(canvasId);
  if (existing) existing.destroy();
  const el = $(canvasId);
  if (!el) return;
  new Chart(el, {
    type: 'radar',
    data: { labels, datasets: [{
      data, fill: true,
      backgroundColor: 'rgba(17, 42, 70, 0.08)',
      borderColor: '#112A46',
      pointBackgroundColor: '#112A46', pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff', pointHoverBorderColor: '#112A46',
      borderWidth: 2
    }]},
    options: {
      scales: { 
        r: { 
          min: 0, max: 5, 
          ticks: { stepSize: 1, display: false }, 
          pointLabels: { font: { family: 'Outfit', size: 11, weight: 600 }, color: '#64676C' },
          grid: { color: '#EBE9E1' }, angleLines: { color: '#EBE9E1' }
        } 
      },
      plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false
    }
  });
}

  } else {
    try { const r = await gasCall('getBiodata', { nokp }); bio = r.data || {}; } catch(e) {}

          <div class="stat-card" style="padding:16px"><div class="lbl">HPK2</div><div class="val" style="font-size:24px">${m && m.hpk2 !== null ? Number(m.hpk2).toFixed(1) : '—'}</div></div>
          <div class="stat-card" style="padding:16px"><div class="lbl">HPK3</div><div class="val" style="font-size:24px">${m && m.hpk3 !== null ? Number(m.hpk3).toFixed(1) : '—'}</div></div>
        </div>
        <div style="text-align:center; background:var(--bg-base); padding:20px; border-radius:var(--radius-sm); border:1px solid var(--border-color);">
          <span style="font-size:13px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; display:block; margin-bottom:4px;">Skor Muktamad</span>
          <span style="font-family:var(--font-heading);font-size:42px;font-weight:600;line-height:1" class="${gredClass(gred)}">${m && m.jumlah !== null ? Number(m.jumlah).toFixed(1) : '—'}</span>
          <span style="font-size:20px;margin-left:8px;font-family:var(--font-heading);font-weight:600;" class="${gredClass(gred)}">${gred}</span>

async function modalPeerDetail(targetAgiliran) {
  const DIMS = ['Kepimpinan','Kerjasama','Komunikasi','Komitmen','Sahsiah'];
  let ratings = [];
  try { const r = await gasCall('getPeerRatings', { targetId: targetAgiliran }); ratings = r.data || []; } catch(e) {}
  const avgDims = DIMS.map(d => {
    const vals = ratings.map(r => parseFloat(r[d])).filter(v => !isNaN(v));
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  });
  const p = PELAJAR_CACHE.find(x => x.agiliran === targetAgiliran) || {};

  html('modal-wrap', `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h3>Perincian Sahsiah</h3>
          <button class="btn-close" onclick="closeModal()">×</button>
        </div>
        <div style="text-align:center; font-family:var(--font-heading); font-size:18px; font-weight:600; color:var(--brand-primary); margin-bottom: 24px;">${(p.nama||'')}</div>
        <div style="height: 240px; margin-bottom:24px;">
          <canvas id="sp-modal" height="240"></canvas>
        </div>
        <div class="divider"></div>
        <div>
          ${DIMS.map((d, i) => `
          <div class="mark-row">
            <div style="flex:1;font-size:14px;font-weight:500">${d}</div>
            <div style="width:50px;text-align:right;font-family:var(--font-heading);font-size:16px;font-weight:600;">${avgDims[i].toFixed(1)}</div>
            <div style="width:120px;padding-left:12px">
              <div class="progress-bar"><div class="progress-fill" style="width:${avgDims[i]/5*100}%;background:var(--brand-primary)"></div></div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>`);
  setTimeout(() => buildSpider('sp-modal', DIMS, avgDims), 100);
}

function closeModal() { html('modal-wrap', ''); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ================================================================
// CLIENT-SIDE LOGIC
// ================================================================
function hitungMarkahClient(m) {
  const k = parseFloat(m.kuiz) || 0; const hp4 = parseFloat(m.hp4) || 0;
  const hp5 = parseFloat(m.hp5) || 0; const hp3 = parseFloat(m.hp3) || 0; const hp8 = parseFloat(m.hp8) || 0;
  const hpk1 = +(k * 0.10).toFixed(2);
  const hpk2 = +(hp4 * 0.30 + hp5 * 0.30).toFixed(2);
  const hpk3 = +(hp3 * 0.15 + hp8 * 0.15).toFixed(2);
  const jumlah = +(hpk1 + hpk2 + hpk3).toFixed(2);
  return { hpk1, hpk2, hpk3, jumlah };
}

function tentukanGredClient(j) {
  if (j >= 90) return 'A+'; if (j >= 80) return 'A'; if (j >= 75) return 'A-';
  if (j >= 70) return 'B+'; if (j >= 65) return 'B'; if (j >= 60) return 'B-';
  if (j >= 55) return 'C+'; if (j >= 50) return 'C'; if (j >= 45) return 'C-';
  if (j >= 40) return 'D'; return 'F';
}
