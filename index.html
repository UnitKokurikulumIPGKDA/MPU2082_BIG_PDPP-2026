<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistem Pentaksiran Berterusan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        .rakan-card { cursor: pointer; transition: 0.3s; }
        .rakan-card:hover { background-color: #f8f9fa; border-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">
    <div id="app" class="container py-4">
        <div id="loginSection" class="card shadow-sm mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <h4 class="text-center mb-4">Log Masuk Sistem</h4>
                <div class="mb-3">
                    <label>Tahun Sesi:</label>
                    <select id="loginTahun" class="form-select">
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>No. Kad Pengenalan / Email:</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan ID">
                </div>
                <div class="mb-3">
                    <label>Password (Untuk Pensyarah):</label>
                    <input type="password" id="password" class="form-control" placeholder="Kosongkan jika Pelajar">
                </div>
                <div class="mb-3">
                    <label>Peranan:</label>
                    <select id="userType" class="form-select">
                        <option value="Pelajar">Pelajar</option>
                        <option value="Pensyarah">Pensyarah</option>
                    </select>
                </div>
                <button onclick="handleLogin()" id="btnLogin" class="btn btn-primary w-100">Masuk</button>
            </div>
        </div>

        <div id="pelajarSection" class="d-none">
            <div class="d-flex align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <img id="myPhoto" src="" class="profile-img me-3">
                <div>
                    <h5 id="myName" class="mb-0">Nama Pelajar</h5>
                    <small id="myKumpulan" class="text-muted">Kumpulan</small>
                </div>
            </div>
            
            <h6>Pilih Rakan Untuk Dinilai:</h6>
            <div id="senaraiRakan" class="row g-2 mb-4"></div>

            <div id="assessmentForm" class="card d-none shadow-sm">
                <div class="card-body">
                    <h5>Menilai: <span id="targetName" class="text-primary"></span></h5>
                    <hr>
                    <div id="criteriaInputs">
                        <label>Kepimpinan: <input type="range" class="form-range" id="m1" min="1" max="5" value="3" oninput="updateChart()"></label>
                        <label>Kerjasama: <input type="range" class="form-range" id="m2" min="1" max="5" value="3" oninput="updateChart()"></label>
                        <label>Komunikasi: <input type="range" class="form-range" id="m3" min="1" max="5" value="3" oninput="updateChart()"></label>
                        <label>Komitmen: <input type="range" class="form-range" id="m4" min="1" max="5" value="3" oninput="updateChart()"></label>
                        <label>Sahsiah: <input type="range" class="form-range" id="m5" min="1" max="5" value="3" oninput="updateChart()"></label>
                    </div>
                    <canvas id="spiderChart"></canvas>
                    <button onclick="hantarMarkah()" class="btn btn-success w-100 mt-3">Hantar Penilaian</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = {};
        let selectedTarget = "";

        function handleLogin() {
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerText = "Memproses...";
            
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const t = document.getElementById('userType').value;
            const thn = document.getElementById('loginTahun').value;

            google.script.run.withSuccessHandler(res => {
                if(res.status === 'success') {
                    if(res.role === 'Pelajar') {
                        showPelajarUI(res);
                    } else {
                        alert("Selamat Datang Pensyarah: " + res.nama);
                        // Logik Pensyarah akan ditambah nanti
                    }
                } else {
                    alert(res.message);
                    btn.disabled = false; btn.innerText = "Masuk";
                }
            }).userLogin(u, p, t, thn);
        }

        function showPelajarUI(res) {
            document.getElementById('loginSection').classList.add('d-none');
            document.getElementById('pelajarSection').classList.remove('d-none');
            currentUser = res.profil;
            document.getElementById('myName').innerText = res.profil.nama;
            document.getElementById('myKumpulan').innerText = res.profil.kumpulan;
            document.getElementById('myPhoto').src = res.profil.gambar || "https://via.placeholder.com/80";

            let html = "";
            res.rakan.forEach(r => {
                html += `
                <div class="col-6 col-md-4">
                    <div class="card p-2 text-center rakan-card" onclick="openAssessment('${r.ic}', '${r.nama}')">
                        <img src="${r.gambar}" class="mx-auto profile-img mb-2" onerror="this.src='https://via.placeholder.com/80'">
                        <small class="d-block text-truncate">${r.nama}</small>
                    </div>
                </div>`;
            });
            document.getElementById('senaraiRakan').innerHTML = html;
        }

        function openAssessment(ic, nama) {
            selectedTarget = ic;
            document.getElementById('targetName').innerText = nama;
            document.getElementById('assessmentForm').classList.remove('d-none');
            window.scrollTo(0,document.body.scrollHeight);
            updateChart();
        }

        // Logik Chart.js akan ditambah di sini
    </script>
</body>
</html>
