<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-BIG PDPP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .avatar-upload { width: 140px; height: 180px; object-fit: cover; border-radius: 20px; border: 4px solid white; transition: 0.3s; }
        .avatar-upload:hover { transform: scale(1.02); filter: brightness(0.9); cursor: pointer; }
        .hidden { display: none !important; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loader" class="fixed inset-0 bg-black/40 z-[100] hidden flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-white font-bold">Memproses Data...</p>
    </div>

    <div id="view-login" class="glass w-full max-w-md p-10 text-center">
        <h1 class="text-3xl font-black text-blue-900 mb-8 tracking-tighter italic">e-BIG PDPP 2026</h1>
        <div class="flex bg-gray-100 rounded-2xl mb-6 p-1">
            <button onclick="setMode('student')" id="btn-m-std" class="flex-1 py-3 text-xs font-bold rounded-xl bg-blue-900 text-white shadow-lg">PELAJAR</button>
            <button onclick="setMode('lecturer')" id="btn-m-lec" class="flex-1 py-3 text-xs font-bold rounded-xl text-gray-400">PENSYARAH</button>
        </div>
        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="user-id" class="w-full p-4 rounded-2xl border text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" placeholder="NO. KAD PENGENALAN" required>
            <div id="pass-field" class="hidden">
                <input type="password" id="user-pass" class="w-full p-4 rounded-2xl border text-center font-bold" placeholder="KATA LALUAN">
            </div>
            <button class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition-all">MASUK</button>
        </form>
        <p class="text-[10px] text-gray-400 mt-8 font-bold uppercase tracking-widest">© 2026 Unit Kokurikulum IPGKDA</p>
    </div>

    <div id="view-student" class="glass w-full max-w-5xl p-8 hidden animate-fade-in">
        <div class="flex justify-between items-center border-b pb-6 mb-8">
            <div><h2 id="std-name" class="text-2xl font-black text-blue-900 uppercase">...</h2><p id="std-meta" class="text-blue-500 font-bold text-[10px]"></p></div>
            <button onclick="location.reload()" class="bg-red-50 text-red-500 font-bold text-xs px-6 py-2 rounded-xl border border-red-100 uppercase">Keluar</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="text-center">
                <div class="relative inline-block group">
                    <img id="display-img" class="avatar-upload shadow-xl bg-gray-200" src="https://via.placeholder.com/140x180?text=Kamera" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="uploadImage(this)">
                    <div class="mt-4 text-[9px] font-bold text-blue-900 uppercase">Klik Gambar Untuk Kemaskini</div>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-6">
                <h3 class="text-xs font-black text-blue-900 border-l-4 border-blue-900 pl-3 uppercase">Penilaian Rakan Sekumpulan</h3>
                <div id="teammates-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="btn-submit-peer" onclick="submitPeer()" class="hidden w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">HANTAR PENILAIAN</button>
            </div>
        </div>
    </div>

    <script>
        const API = "URL_WEB_APP_ANDA_DI_SINI"; 
        let currentMode = 'student', user = null, teammates = [];

        function setMode(m) {
            currentMode = m;
            document.getElementById('pass-field').classList.toggle('hidden', m === 'student');
            document.getElementById('btn-m-std').className = m === 'student' ? "flex-1 py-3 text-xs font-bold rounded-xl bg-blue-900 text-white shadow-lg" : "flex-1 py-3 text-xs font-bold rounded-xl text-gray-400";
            document.getElementById('btn-m-lec').className = m === 'lecturer' ? "flex-1 py-3 text-xs font-bold rounded-xl bg-blue-900 text-white shadow-lg" : "flex-1 py-3 text-xs font-bold rounded-xl text-gray-400";
            document.getElementById('user-id').placeholder = m === 'student' ? "NO. KAD PENGENALAN" : "EMAIL PENSYARAH";
        }

        function handleLogin(e) {
            e.preventDefault(); toggleLoader(true);
            const body = {
                action: currentMode === 'student' ? "login_student" : "login_lecturer",
                no_kp: document.getElementById('user-id').value,
                email: document.getElementById('user-id').value,
                password: document.getElementById('user-pass').value
            };
            fetch(API, { method: "POST", body: JSON.stringify(body) }).then(r => r.json()).then(res => {
                toggleLoader(false);
                if(res.result === "success") {
                    if(currentMode === 'student') { user = res.data; initStudent(); }
                    else { alert("Mod Pensyarah Aktif: " + res.nama); }
                } else alert(res.message);
            });
        }

        function uploadImage(input) {
            if (input.files && input.files[0]) {
                toggleLoader(true);
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('display-img').src = e.target.result;
                    google.script.run.withSuccessHandler(res => {
                        toggleLoader(false);
                        alert("Gambar Berjaya Disimpan!");
                    }).uploadPhoto(e.target.result, `PDPP_${user.id}.jpg`, user.id);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initStudent() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-student').classList.remove('hidden');
            document.getElementById('std-name').innerText = user.nama;
            document.getElementById('std-meta').innerText = `SIRI: ${user.siri} | KUMPULAN: ${user.nama_kump}${user.no_kump}`;
            if(user.url_gambar) document.getElementById('display-img').src = user.url_gambar;
            loadTeammates();
        }

        function loadTeammates() {
            fetch(API, { method: "POST", body: JSON.stringify({ action:"get_teammates", reviewer_id:user.id, siri:user.siri, nama_kump:user.nama_kump }) })
            .then(r => r.json()).then(res => {
                teammates = res.data;
                const grid = document.getElementById('teammates-grid');
                grid.innerHTML = teammates.map(t => `
                    <div class="bg-white/50 p-4 rounded-3xl border border-white">
                        <div class="flex items-center gap-3 mb-4">
                            <img src="${t.url_gambar || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-xl object-cover">
                            <p class="text-[10px] font-black uppercase text-blue-900">${t.nama}</p>
                        </div>
                        <div class="grid grid-cols-5 gap-1">
                            ${[1,2,3,4,5].map(i => `<input type="number" id="m${i}_${t.id}" min="1" max="5" class="w-full p-2 rounded-xl text-center text-xs font-bold bg-white border" placeholder="K${i}">`).join('')}
                        </div>
                    </div>
                `).join('');
                if(teammates.length > 0) document.getElementById('btn-submit-peer').classList.remove('hidden');
            });
        }

        function toggleLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
    </script>
</body>
</html>
